<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>ぱしゃっとバトル!</title>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ぱしゃっとバトル">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#BDE6FF">
<meta name="description" content="しゃしんが キャラクターに へんしん! ひらがな・カタカナ・すうじ・けいさん・えいごを あそびながら まなべる ゲーム">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='88'%3E%F0%9F%93%B8%3C/text%3E%3C/svg%3E">
<link rel="apple-touch-icon" href="icon.png">
<style>
:root{
  --sky1:#BDE6FF; --sky2:#DFF5DC;
  --card:#FFFDF7; --ink:#4A3B5C; --ink-soft:#8A7F9C;
  --coral:#FF6B81; --coral-d:#E04A64;
  --sun:#FFC53D;  --sun-d:#E09E0C;
  --leaf:#4FC978; --leaf-d:#2FA657;
  --blue:#4DA8FF; --blue-d:#2E86E0;
  --berry:#8E7CF3; --berry-d:#6C5CE0;
  --line:#EFE3CE;
  color-scheme: light;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  font-family:"Hiragino Maru Gothic ProN","Hiragino Kaku Gothic ProN","BIZ UDPGothic","Yu Gothic",sans-serif;
  color:var(--ink);
  overscroll-behavior:none;
  -webkit-user-select:none;user-select:none;
  -webkit-touch-callout:none;
  touch-action:manipulation;
}
#app{
  position:fixed;inset:0;
  background:linear-gradient(180deg,var(--sky1) 0%,#E6F4FF 45%,var(--sky2) 100%);
  overflow:hidden;
}
#app::before,#app::after{
  content:"";position:absolute;border-radius:999px;background:rgba(255,255,255,.65);
  width:34vw;height:10vw;min-height:56px;filter:blur(2px);pointer-events:none;z-index:0;
}
#app::before{top:6%;left:-6%}
#app::after{top:14%;right:-8%;width:26vw}
.screen{
  position:absolute;inset:0;display:none;flex-direction:column;align-items:center;
  padding:max(14px,env(safe-area-inset-top)) 16px max(14px,env(safe-area-inset-bottom));
  overflow-y:auto;-webkit-overflow-scrolling:touch;z-index:1;
}
.screen.active{display:flex}

/* ===== buttons ===== */
.btn{
  font-family:inherit;border:none;cursor:pointer;color:#fff;
  background:var(--coral);border-radius:26px;
  box-shadow:0 6px 0 var(--coral-d),0 10px 18px rgba(74,59,92,.14);
  font-size:clamp(20px,3.4vw,27px);font-weight:800;letter-spacing:.04em;
  padding:18px 30px;min-height:64px;
  transition:transform .06s,box-shadow .06s;
}
.btn:active{transform:translateY(5px);box-shadow:0 1px 0 var(--coral-d)}
.btn.sun{background:var(--sun);box-shadow:0 6px 0 var(--sun-d),0 10px 18px rgba(74,59,92,.14)}
.btn.sun:active{box-shadow:0 1px 0 var(--sun-d)}
.btn.leaf{background:var(--leaf);box-shadow:0 6px 0 var(--leaf-d),0 10px 18px rgba(74,59,92,.14)}
.btn.leaf:active{box-shadow:0 1px 0 var(--leaf-d)}
.btn.blue{background:var(--blue);box-shadow:0 6px 0 var(--blue-d),0 10px 18px rgba(74,59,92,.14)}
.btn.blue:active{box-shadow:0 1px 0 var(--blue-d)}
.btn.berry{background:var(--berry);box-shadow:0 6px 0 var(--berry-d),0 10px 18px rgba(74,59,92,.14)}
.btn.berry:active{box-shadow:0 1px 0 var(--berry-d)}
.btn.big{font-size:clamp(26px,4.6vw,36px);padding:22px 46px;border-radius:32px;min-height:80px}
.btn.ghost{
  background:var(--card);color:var(--ink);border:3px solid var(--line);
  box-shadow:0 5px 0 #E2D4BC;
}
.btn.ghost:active{box-shadow:0 1px 0 #E2D4BC}
.back{
  position:absolute;top:max(10px,env(safe-area-inset-top));left:12px;z-index:15;
  font-size:18px;padding:10px 18px;min-height:48px;border-radius:20px;
}
.iconrow{display:flex;gap:14px;flex-wrap:wrap;justify-content:center}

/* ===== logo ===== */
.logo{
  font-size:clamp(38px,8vw,66px);font-weight:900;line-height:1.15;text-align:center;
  text-shadow:-3px -3px 0 #fff,3px -3px 0 #fff,-3px 3px 0 #fff,3px 3px 0 #fff,0 3px 0 #fff,0 -3px 0 #fff,3px 0 0 #fff,-3px 0 0 #fff,0 8px 0 rgba(74,59,92,.13);
  letter-spacing:.02em;
}
.logo .c1{color:var(--coral)} .logo .c2{color:var(--sun)} .logo .c3{color:var(--leaf)}
.logo .c4{color:var(--blue)} .logo .c5{color:var(--berry)}
.tagline{color:var(--ink-soft);font-weight:700;font-size:clamp(14px,2.4vw,18px);margin-top:6px;text-align:center}

/* ===== avatar ===== */
.avatar{border-radius:50%;object-fit:cover;background:#fff;display:block}
.avatar-wrap{position:relative;display:inline-flex;flex-direction:column;align-items:center}
.avatar-emoji{border-radius:50%;background:#fff;display:flex;align-items:center;justify-content:center}
.lv-badge{
  position:relative;display:block;width:max-content;margin:2px auto 0;background:var(--sun);color:#fff;
  border:3px solid #fff;border-radius:999px;font-weight:900;
  font-size:14px;padding:3px 10px;box-shadow:0 2px 6px rgba(74,59,92,.2);white-space:nowrap;
}
.job-badge{
  position:absolute;top:-6px;left:-8px;background:#fff;border-radius:50%;
  width:32px;height:32px;display:flex;align-items:center;justify-content:center;
  font-size:18px;box-shadow:0 2px 6px rgba(74,59,92,.25);
}
.char-name{font-weight:900;text-align:center;margin-top:8px;font-size:clamp(16px,2.6vw,22px)}

/* ===== hp bars ===== */
.hpbar{
  height:11px;background:rgba(0,0,0,.22);border-radius:99px;overflow:hidden;
  border:2px solid rgba(255,255,255,.85);min-width:54px;margin:4px auto 0;
  box-shadow:0 1px 3px rgba(0,0,0,.2);
}
.hpfill{height:100%;background:#4FC978;transition:width .45s;border-radius:99px}
.hpfill.mid{background:#FFC53D}
.hpfill.low{background:#FF5A5A}
.dmg-pop{
  position:absolute;font-weight:900;font-size:clamp(22px,4vw,36px);color:#fff;
  text-shadow:0 0 6px rgba(0,0,0,.4),0 2px 0 rgba(0,0,0,.35);
  animation:dmgpop .85s forwards;z-index:14;pointer-events:none;font-variant-numeric:tabular-nums;
}
.dmg-pop.hurt{color:#FFB3B3}
@keyframes dmgpop{0%{transform:translate(-50%,-50%) scale(.4);opacity:0}18%{opacity:1;transform:translate(-50%,-90%) scale(1.25)}100%{transform:translate(-50%,-190%) scale(1);opacity:0}}

/* ===== home ===== */
#home{justify-content:space-evenly}
#home .homechar .avatar,#home .homechar .avatar-emoji{
  width:clamp(110px,18vw,160px);height:clamp(110px,18vw,160px);font-size:clamp(60px,10vw,90px);
  border:6px solid #fff;box-shadow:0 8px 22px rgba(74,59,92,.18);
}
#home .menu{display:flex;flex-direction:column;gap:16px;align-items:center;width:100%;max-width:430px}
#home .menu .btn{width:100%}
.party-mini{display:flex;gap:6px;justify-content:center;margin-top:8px}
.party-mini .avatar,.party-mini .avatar-emoji{width:40px;height:40px;font-size:24px;border:3px solid #fff;box-shadow:0 2px 6px rgba(74,59,92,.18)}
.parent-link{
  background:none;border:none;color:var(--ink-soft);font-family:inherit;font-weight:700;
  font-size:15px;padding:12px;cursor:pointer;text-decoration:underline;
}

/* ===== panels ===== */
.panel{
  background:var(--card);border:3px solid var(--line);border-radius:28px;
  box-shadow:0 6px 0 #EADDC6,0 12px 24px rgba(74,59,92,.08);
  padding:20px;width:100%;max-width:560px;
}
.h1{font-size:clamp(24px,4.4vw,34px);font-weight:900;text-align:center;
  text-shadow:-2px -2px 0 #fff,2px -2px 0 #fff,-2px 2px 0 #fff,2px 2px 0 #fff,0 5px 0 rgba(74,59,92,.1)}
.h1.coral{color:var(--coral)} .h1.leaf{color:var(--leaf)} .h1.sun{color:#EFA400}
.h1.blue{color:var(--blue)} .h1.berry{color:var(--berry)}

/* ===== subjects ===== */
#subject .grid{
  display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
  gap:16px;width:100%;max-width:640px;margin-top:18px;
}
.subj{
  border:none;font-family:inherit;cursor:pointer;border-radius:28px;color:#fff;
  padding:18px 8px 16px;display:flex;flex-direction:column;align-items:center;gap:6px;
  transition:transform .06s,box-shadow .06s;min-height:130px;
}
.subj .glyph{font-size:clamp(36px,6vw,50px);font-weight:900;
  text-shadow:-2px -2px 0 rgba(255,255,255,.35),2px 2px 0 rgba(0,0,0,.08)}
.subj .label{font-size:clamp(17px,2.6vw,21px);font-weight:800}
.subj:active{transform:translateY(5px)}
.subj.s-hira{background:var(--coral);box-shadow:0 6px 0 var(--coral-d)}
.subj.s-kata{background:var(--berry);box-shadow:0 6px 0 var(--berry-d)}
.subj.s-kazu{background:var(--sun);box-shadow:0 6px 0 var(--sun-d)}
.subj.s-keisan{background:var(--leaf);box-shadow:0 6px 0 var(--leaf-d)}
.subj.s-eigo{background:var(--blue);box-shadow:0 6px 0 var(--blue-d)}
.subj:active{box-shadow:0 1px 0 rgba(0,0,0,.2)}

/* ===== dungeon select ===== */
#dungeon .dgrid{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(88px,1fr));
  gap:12px;width:100%;max-width:640px;margin-top:16px;padding-bottom:24px;
}
.dg{
  font-family:inherit;border:3px solid var(--line);background:var(--card);border-radius:22px;
  cursor:pointer;padding:10px 4px;display:flex;flex-direction:column;align-items:center;gap:2px;
  box-shadow:0 5px 0 #EADDC6;transition:transform .06s;
}
.dg:active{transform:translateY(4px);box-shadow:0 1px 0 #EADDC6}
.dg .dnum{font-size:clamp(22px,4vw,30px);font-weight:900;font-variant-numeric:tabular-nums}
.dg .dstage{font-size:22px}
.dg .dstar{font-size:14px;min-height:18px}
.dg.frontier{border-color:var(--sun);background:#FFF8E5;animation:pulse 1.6s infinite}
@keyframes pulse{0%,100%{box-shadow:0 5px 0 #EADDC6}50%{box-shadow:0 5px 0 var(--sun-d),0 0 0 7px rgba(255,197,61,.4)}}

/* ===== battle ===== */
#battle{padding-top:max(8px,env(safe-area-inset-top));background:#F8F2E7;overflow:hidden}
#battle.darkstage .char-name,#battle.darkstage .ename{color:#fff;text-shadow:0 1px 4px rgba(0,0,0,.55)}
#battle.darkstage{background:#241D35}
.battle-scene{
  position:relative;z-index:0;width:calc(100% + 32px);margin:-8px -16px 8px;
  flex:1 1 260px;min-height:260px;display:flex;flex-direction:column;overflow:hidden;
  border-radius:0 0 30px 30px;box-shadow:0 6px 0 rgba(93,72,105,.13),0 12px 22px rgba(74,59,92,.12);
  background:#A9DEFF;
}
#stageBg{position:absolute;inset:0;pointer-events:none;z-index:0;overflow:hidden;background:#A9DEFF}
#stageBg svg{width:100%;height:100%;display:block}
#stageBg::after{
  content:"";position:absolute;inset:0;pointer-events:none;
  background:linear-gradient(180deg,rgba(255,255,255,.09),transparent 36%,rgba(37,27,50,.09));
}
#stageBg.variant-1::before,#stageBg.variant-2::before{content:"";position:absolute;inset:0;z-index:1;pointer-events:none}
#stageBg.variant-1::before{background:linear-gradient(135deg,rgba(255,237,172,.16),transparent 48%,rgba(255,180,143,.11))}
#stageBg.variant-2::before{background:linear-gradient(160deg,rgba(220,244,255,.14),transparent 45%,rgba(148,129,220,.09))}
#stageBg .scene-drift{animation:sceneDrift 9s ease-in-out infinite;transform-box:fill-box;transform-origin:center}
#stageBg .scene-sway{animation:sceneSway 4.8s ease-in-out infinite;transform-box:fill-box;transform-origin:bottom center}
#stageBg .scene-twinkle{animation:sceneTwinkle 2.6s ease-in-out infinite;transform-box:fill-box;transform-origin:center}
@keyframes sceneDrift{0%,100%{opacity:.9}50%{opacity:1}}
@keyframes sceneSway{0%,100%{opacity:.96}50%{opacity:1}}
@keyframes sceneTwinkle{0%,100%{opacity:.45;transform:scale(.78)}50%{opacity:1;transform:scale(1.12)}}
#battle.shake{animation:screenshake .45s}
@keyframes screenshake{0%,100%{transform:translate(0,0)}20%{transform:translate(-10px,6px)}40%{transform:translate(9px,-6px)}60%{transform:translate(-6px,4px)}80%{transform:translate(4px,-2px)}}
.battle-top{width:100%;display:flex;justify-content:center;padding:4px 0 0;position:relative;z-index:1}
.subj-chip{
  background:#fff;border:3px solid var(--line);border-radius:999px;padding:6px 20px;
  font-weight:900;font-size:16px;color:var(--ink-soft);
}
.stage-banner{
  position:absolute;top:34%;left:50%;z-index:20;pointer-events:none;white-space:nowrap;
  font-size:clamp(26px,5.2vw,44px);font-weight:900;color:#fff;
  background:rgba(74,59,92,.65);padding:14px 34px;border-radius:999px;
  animation:bannerA 1.7s forwards;
}
@keyframes bannerA{0%{opacity:0;transform:translateX(-50%) scale(.5)}18%{opacity:1;transform:translateX(-50%) scale(1.06)}30%{transform:translateX(-50%) scale(1)}80%{opacity:1}100%{opacity:0;transform:translateX(-50%) scale(1.05)}}

.arena{
  position:relative;z-index:1;width:100%;max-width:860px;flex:1 1 auto;margin:0 auto;
  display:flex;flex-direction:column;justify-content:space-evenly;align-items:center;gap:6px;padding:4px 0;
}
.enemy-row,.party-row{display:flex;gap:clamp(6px,2vw,22px);justify-content:center;align-items:flex-end;width:100%}
.enemy-unit{text-align:center;width:clamp(88px,22vw,180px);transition:transform .3s;position:relative;filter:drop-shadow(0 5px 4px rgba(54,40,72,.14))}
.enemy-unit .body{width:clamp(84px,16.5vw,156px);height:clamp(84px,16.5vw,156px);font-size:clamp(72px,15vw,144px);line-height:1.05;display:inline-flex;align-items:center;justify-content:center;animation:bob 2.4s ease-in-out infinite}
.enemy-unit:nth-child(2) .body,.enemy-unit:nth-child(2) .enemy-portrait{animation-delay:-.6s}
.enemy-unit:nth-child(3) .body,.enemy-unit:nth-child(3) .enemy-portrait{animation-delay:-1.2s}
.enemy-unit:nth-child(4) .body,.enemy-unit:nth-child(4) .enemy-portrait{animation-delay:-1.8s}
.monster-art{width:100%;height:100%;display:block;overflow:visible;filter:drop-shadow(0 4px 2px rgba(65,46,78,.2))}
.monster-art .art-eye{fill:#3F304F}
.monster-art .art-shine{fill:#fff}
.monster-art .art-cheek{fill:#FF91A8;opacity:.72;stroke:none}
.enemy-portrait{position:relative;display:inline-flex;animation:bob 2.4s ease-in-out infinite;isolation:isolate}
.enemy-portrait::before,.enemy-portrait::after{content:"";position:absolute;top:-5px;width:22px;height:27px;background:#8E7CF3;border:3px solid #5C4A77;z-index:-1}
.enemy-portrait::before{left:5px;border-radius:85% 20% 70% 25%;transform:rotate(-24deg)}
.enemy-portrait::after{right:5px;border-radius:20% 85% 25% 70%;transform:rotate(24deg)}
.enemy-unit img.ebody{
  width:clamp(80px,15vw,144px);height:clamp(80px,15vw,144px);border-radius:50%;object-fit:cover;
  border:5px solid var(--enemy-frame,#5C4A77);box-shadow:0 0 0 4px #fff,0 5px 14px rgba(0,0,0,.28);background:#fff;
}
.enemy-unit .ename{display:inline-block;max-width:100%;padding:3px 9px;background:rgba(255,255,255,.82);border:2px solid rgba(255,255,255,.9);border-radius:14px;font-weight:900;color:#5A4B69;font-size:clamp(12px,2vw,16px);line-height:1.2;white-space:normal;overflow-wrap:anywhere;box-shadow:0 2px 5px rgba(45,35,58,.12)}
#battle.darkstage .enemy-unit .ename{background:rgba(42,30,58,.8);border-color:rgba(255,255,255,.35)}
.enemy-unit.hit .body,.enemy-unit.hit .enemy-portrait{animation:shake .45s}
.enemy-unit.down .body,.enemy-unit.down .enemy-portrait{filter:grayscale(1);opacity:.28;transform:rotate(105deg);animation:none;transition:transform .5s,opacity .5s}
.enemy-unit.bossu{width:min(82vw,460px)}
.enemy-unit.bossu .body{width:clamp(180px,34vw,300px);height:clamp(180px,34vw,300px);font-size:clamp(160px,32vw,280px)}
.enemy-unit.bossu img.ebody{width:clamp(164px,32vw,280px);height:clamp(164px,32vw,280px);border-width:7px;border-color:#3E2B52}
.enemy-unit.bossu .ename{font-size:clamp(15px,2.6vw,20px)}
.enemy-unit.bossu .hpbar{height:16px;min-width:min(56vw,300px)}
.enemy-unit .crown{display:block;width:clamp(58px,9vw,86px);height:clamp(42px,6.75vw,66px);margin:0 auto -12px;position:relative;z-index:2;filter:drop-shadow(0 2px 1px rgba(75,45,55,.24))}
.enemy-unit .crown svg{width:100%;height:100%;display:block}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-13px) rotate(-6deg)}40%{transform:translateX(11px) rotate(5deg)}60%{transform:translateX(-7px)}80%{transform:translateX(5px)}}

.party-unit{text-align:center;transition:transform .25s;position:relative}
.party-unit .avatar,.party-unit .avatar-emoji{
  width:clamp(82px,16.5vw,156px);height:clamp(82px,16.5vw,156px);font-size:clamp(48px,9.9vw,90px);
  border:4px solid #fff;box-shadow:0 5px 14px rgba(74,59,92,.22);
}
.party-unit .lv-badge{font-size:11px;padding:2px 8px;border-width:2px}
.party-unit .job-badge{width:26px;height:26px;font-size:14px}
.party-unit .char-name{font-size:clamp(11px,2vw,15px);margin-top:4px;white-space:nowrap;max-width:clamp(70px,14vw,120px);overflow:hidden;text-overflow:ellipsis}
.party-unit.next{transform:translateY(-9px)}
.party-unit.next .avatar,.party-unit.next .avatar-emoji{box-shadow:0 0 0 4px var(--sun),0 7px 16px rgba(74,59,92,.28)}
.party-unit.ko .avatar,.party-unit.ko .avatar-emoji{filter:grayscale(1);opacity:.4}
.party-unit.ko::after{content:"😵";position:absolute;top:0;left:50%;transform:translateX(-50%);font-size:clamp(24px,4.4vw,40px);z-index:2}
.party-unit.cast .avatar,.party-unit.cast .avatar-emoji{box-shadow:0 0 0 6px #BFA8FF,0 0 26px 10px rgba(160,120,255,.75)}

/* ボス戦は大きなボスと味方を左右に分け、どちらも画面内に全身を表示する */
#battle.boss-phase .arena{flex-direction:row;justify-content:center;align-items:center;gap:clamp(8px,2vw,24px)}
#battle.boss-phase .enemy-row{width:58%;flex:0 1 58%}
#battle.boss-phase .party-row{width:42%;flex:0 1 42%;flex-wrap:wrap;align-content:center;row-gap:6px}

/* ===== attack fx ===== */
#fxLayer{position:absolute;inset:0;pointer-events:none;z-index:12}
.fx-main{position:absolute;transform:translate(-50%,-50%) scale(.3);font-size:clamp(50px,9vw,84px);animation:pow .6s forwards}
@keyframes pow{0%{opacity:0;transform:translate(-50%,-50%) scale(.3)}30%{opacity:1;transform:translate(-50%,-50%) scale(1.3) rotate(-8deg)}70%{opacity:1;transform:translate(-50%,-50%) scale(1.05) rotate(6deg)}100%{opacity:0;transform:translate(-50%,-50%) scale(1.5)}}
.fx-part{position:absolute;font-size:clamp(18px,3.6vw,32px);animation:part .65s ease-out forwards;opacity:0}
@keyframes part{0%{opacity:1;transform:translate(-50%,-50%) scale(.6)}100%{opacity:0;transform:translate(calc(-50% + var(--tx)),calc(-50% + var(--ty))) scale(1.5)}}
.fx-flash{position:absolute;inset:0;animation:flashA .5s forwards}
@keyframes flashA{0%{opacity:0}25%{opacity:1}100%{opacity:0}}
.fx-slash{
  position:absolute;width:clamp(120px,22vw,220px);height:9px;border-radius:9px;
  background:linear-gradient(90deg,transparent,#fff 45%,#fff 55%,transparent);
  animation:slashA .38s forwards;opacity:0;
}
@keyframes slashA{0%{opacity:0;scale:.3}30%{opacity:1}100%{opacity:0;scale:1.3}}
.fx-bolt{
  position:absolute;width:10px;height:clamp(120px,24vh,220px);
  background:linear-gradient(180deg,#FFF8C4,#FFD23F);border-radius:6px;
  transform:translate(-50%,-100%);transform-origin:bottom;
  animation:boltA .4s forwards;opacity:0;box-shadow:0 0 18px 6px rgba(255,220,80,.8);
}
@keyframes boltA{0%{opacity:0;transform:translate(-50%,-140%) scaleY(.2)}25%{opacity:1;transform:translate(-50%,-100%) scaleY(1)}100%{opacity:0;transform:translate(-50%,-100%) scaleY(1)}}

/* ===== question ===== */
.qcard{
  background:var(--card);border:3px solid var(--line);border-radius:28px;
  box-shadow:0 6px 0 #EADDC6,0 10px 20px rgba(74,59,92,.08);
  width:100%;max-width:640px;min-height:clamp(88px,13vh,144px);
  display:flex;align-items:center;justify-content:center;gap:14px;
  padding:12px 66px 12px 20px;position:relative;margin:8px 0;z-index:1;
  animation:popin .3s;
}
@keyframes popin{0%{transform:scale(.9);opacity:0}100%{transform:scale(1);opacity:1}}
.qcard .qbig{font-size:clamp(44px,7.6vw,72px);line-height:1.1;text-align:center}
.qcard .qword{font-size:clamp(36px,6.8vw,58px);font-weight:900;letter-spacing:.1em;text-align:center}
.qcard .qsub{font-size:clamp(16px,2.7vw,23px);font-weight:800;color:var(--ink-soft);text-align:center;margin-top:2px}
.qcard .qformula{font-size:clamp(32px,6.2vw,54px);font-weight:900;text-align:center;font-variant-numeric:tabular-nums}
.qcard .qviz{font-size:clamp(19px,3.4vw,28px);text-align:center;margin-top:4px;line-height:1.4;word-break:break-all}
.qcard .qviz .fade{opacity:.28;filter:grayscale(1)}
.qcard .qcount{font-size:clamp(26px,4.8vw,40px);text-align:center;line-height:1.35;word-break:break-all;max-width:430px}
.picture-token{
  --pic1:#FFEFAE;--pic2:#FFB9C8;position:relative;display:inline-grid;place-items:center;
  width:clamp(62px,9vw,86px);height:clamp(62px,9vw,86px);border-radius:38% 46% 40% 48%;
  background:linear-gradient(145deg,#fff 0 18%,var(--pic1) 19% 68%,var(--pic2));
  border:4px solid #fff;box-shadow:0 0 0 3px rgba(99,73,116,.15),0 6px 10px rgba(74,59,92,.16);
  isolation:isolate;transform:rotate(-2deg);vertical-align:middle;
}
.picture-token::before{content:"";position:absolute;inset:8%;border-radius:42% 36% 47% 38%;border:2px dashed rgba(255,255,255,.72);z-index:0}
.picture-token::after{content:"✦";position:absolute;right:6%;top:1%;font-size:.3em;color:#fff;text-shadow:0 1px 2px rgba(94,68,110,.25)}
.picture-token .picture-emoji{position:relative;z-index:1;font-size:clamp(38px,6.2vw,58px);line-height:1;filter:drop-shadow(0 3px 1px rgba(70,48,77,.2));transform:rotate(2deg)}
.picture-token .picture-svg{position:relative;z-index:1;width:82%;height:82%;display:block;overflow:visible;filter:drop-shadow(0 3px 1px rgba(70,48,77,.18));transform:rotate(2deg)}
.picture-token.p1{--pic1:#C9F1D0;--pic2:#7ED7B0}.picture-token.p2{--pic1:#CFEAFF;--pic2:#83C7F6}
.picture-token.p3{--pic1:#E4D5FF;--pic2:#B69AF1}.picture-token.p4{--pic1:#FFD9B8;--pic2:#FFAA76}
.picture-token.p5{--pic1:#FFF2B6;--pic2:#FFD85E}
.qcard .qbig .picture-token{width:clamp(72px,11vw,104px);height:clamp(72px,11vw,104px)}
.qcard .qbig .picture-emoji{font-size:clamp(46px,7.4vw,70px)}
.qsub-picture{margin-top:8px;text-align:center}.qsub-picture .picture-token{width:56px;height:56px;border-width:3px}.qsub-picture .picture-emoji{font-size:36px}
.choice .picture-token{width:clamp(54px,8vw,76px);height:clamp(54px,8vw,76px);border-width:3px;box-shadow:0 0 0 2px rgba(99,73,116,.12),0 4px 7px rgba(74,59,92,.12)}
.choice .picture-emoji{font-size:clamp(34px,5.5vw,50px)}
.choice .picture-svg{width:84%;height:84%}
.count-pictures{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:5px 8px;align-items:center;justify-items:center;max-width:400px;margin:auto}
.count-picture{display:inline-grid;place-items:center;width:clamp(30px,4.6vw,42px);height:clamp(30px,4.6vw,42px);border-radius:50%;background:rgba(255,255,255,.75);box-shadow:0 2px 5px rgba(74,59,92,.13);font-size:clamp(22px,3.5vw,32px);line-height:1}
.choice .count-pictures{grid-template-columns:repeat(5,minmax(0,1fr));gap:2px;max-width:150px}.choice .count-picture{width:clamp(18px,2.7vw,28px);height:clamp(18px,2.7vw,28px);font-size:clamp(14px,2.2vw,22px);box-shadow:none}
.math-pictures{display:flex;align-items:center;justify-content:center;gap:8px;flex-wrap:wrap}.math-pictures .group{display:grid;grid-template-columns:repeat(5,auto);gap:3px;position:relative}.math-pictures .op{font-size:1.15em;font-weight:900}.math-pictures .fade{opacity:.28;filter:grayscale(1)}.math-pictures .removed::after{content:"";position:absolute;left:-3px;right:-3px;top:50%;height:4px;border-radius:4px;background:var(--coral);transform:rotate(-16deg)}
.speak-btn{
  position:absolute;right:12px;top:50%;transform:translateY(-50%);
  border:none;background:var(--sun);color:#fff;border-radius:50%;cursor:pointer;
  width:52px;height:52px;font-size:26px;box-shadow:0 4px 0 var(--sun-d);
}
.speak-btn:active{transform:translateY(calc(-50% + 3px));box-shadow:0 1px 0 var(--sun-d)}
.choices{display:flex;gap:14px;width:100%;max-width:640px;padding-bottom:8px;position:relative;z-index:1}
.choice{
  flex:1;border:3px solid var(--line);background:var(--card);border-radius:26px;cursor:pointer;
  font-family:inherit;color:var(--ink);font-weight:900;
  font-size:clamp(30px,5.6vw,50px);min-height:clamp(70px,11vh,110px);
  box-shadow:0 6px 0 #EADDC6;transition:transform .06s,box-shadow .06s;
  display:flex;align-items:center;justify-content:center;
}
.choice:active{transform:translateY(5px);box-shadow:0 1px 0 #EADDC6}
.choice.wrong{opacity:.32;filter:grayscale(1);pointer-events:none;animation:shake .4s}
.choice.right{background:var(--leaf);border-color:var(--leaf-d);color:#fff;animation:popin .35s}
.choice .cswatch{width:clamp(44px,7vw,62px);height:clamp(44px,7vw,62px);border-radius:50%;border:4px solid #fff;box-shadow:0 0 0 3px var(--line)}
.choices.words .choice{font-size:clamp(18px,3.4vw,30px);line-height:1.25;word-break:break-all;padding:6px 4px;letter-spacing:.04em}

/* ===== result / lose ===== */
#result,#lose{justify-content:center;gap:14px}
.result-title{font-size:clamp(44px,9vw,72px)}
.sticker-get{
  background:var(--card);border:3px dashed var(--sun);border-radius:28px;padding:16px 34px;
  display:flex;flex-direction:column;align-items:center;gap:4px;
  box-shadow:0 8px 20px rgba(74,59,92,.1);animation:popin .4s;
}
.sticker-get .st{width:clamp(86px,13vw,118px);height:clamp(86px,13vw,118px);display:grid;place-items:center;font-size:clamp(56px,10vw,84px);animation:bob 1.8s ease-in-out infinite}
.sticker-get .st .sticker-art{width:78%;height:78%}.sticker-get .st .sticker-emoji{font-size:clamp(46px,7vw,66px)}
.sticker-get .cap{font-weight:900;color:var(--ink-soft);text-align:center;font-size:clamp(14px,2.6vw,18px)}
.result-party{display:flex;gap:14px;justify-content:center;flex-wrap:wrap}
.result-party .avatar,.result-party .avatar-emoji{width:70px;height:70px;font-size:40px;border:4px solid #fff;box-shadow:0 4px 12px rgba(74,59,92,.18)}
.result-party .char-name{font-size:13px;margin-top:3px}
.xp-note{font-weight:900;color:var(--ink-soft);font-size:clamp(16px,3vw,21px);text-align:center}
.lvup-line{color:#EFA400;font-weight:900;font-size:clamp(18px,3.2vw,24px);text-align:center;
  text-shadow:-2px -2px 0 #fff,2px -2px 0 #fff,-2px 2px 0 #fff,2px 2px 0 #fff}
.unlock-line{color:var(--blue-d);font-weight:900;font-size:clamp(18px,3.2vw,24px);text-align:center;
  text-shadow:-2px -2px 0 #fff,2px -2px 0 #fff,-2px 2px 0 #fff,2px 2px 0 #fff}
.perfect{color:#EFA400;font-weight:900;font-size:clamp(20px,3.6vw,28px);
  text-shadow:-2px -2px 0 #fff,2px -2px 0 #fff,-2px 2px 0 #fff,2px 2px 0 #fff}

/* ===== create ===== */
#create .panel{display:flex;flex-direction:column;align-items:center;gap:16px}
.cropbox{position:relative;width:min(72vw,340px);height:min(72vw,340px);touch-action:none}
.cropbox canvas{width:100%;height:100%;border-radius:24px;background:#EDE6F5;display:block}
.cropbox .mask{position:absolute;inset:0;border-radius:24px;overflow:hidden;pointer-events:none}
.cropbox .mask::before{
  content:"";position:absolute;left:50%;top:50%;width:92%;height:92%;
  transform:translate(-50%,-50%);border-radius:50%;
  box-shadow:0 0 0 400px rgba(255,253,247,.72);border:3px dashed var(--berry);
}
.zoomrow{display:flex;align-items:center;gap:10px;width:min(72vw,340px)}
.zoomrow input{flex:1;accent-color:var(--berry);height:36px}
.zoomrow span{font-size:22px}
.namerow{display:flex;gap:10px;align-items:center;width:100%;max-width:380px}
.namerow input{
  flex:1;font-family:inherit;font-size:24px;font-weight:800;color:var(--ink);
  border:3px solid var(--line);border-radius:18px;padding:12px 16px;background:#fff;
  -webkit-user-select:auto;user-select:auto;min-width:0;
}
.dice{border:none;background:var(--berry);color:#fff;border-radius:18px;width:58px;height:58px;
  font-size:28px;cursor:pointer;box-shadow:0 4px 0 var(--berry-d);flex:0 0 auto}
.dice:active{transform:translateY(3px);box-shadow:0 1px 0 var(--berry-d)}
.frames{display:flex;gap:12px}
.frame-swatch{width:52px;height:52px;border-radius:50%;border:4px solid #fff;cursor:pointer;
  box-shadow:0 0 0 3px var(--line);transition:transform .1s}
.frame-swatch.sel{transform:scale(1.2);box-shadow:0 0 0 4px var(--ink)}
.preview-big{width:150px;height:150px;font-size:80px}
.rolerow{display:flex;gap:12px;width:100%;max-width:400px}
.role-btn{
  flex:1;font-family:inherit;border:3px solid var(--line);background:#fff;border-radius:20px;
  padding:12px 6px;font-size:clamp(16px,2.8vw,20px);font-weight:900;color:var(--ink-soft);cursor:pointer;
  box-shadow:0 4px 0 #EADDC6;display:flex;flex-direction:column;gap:2px;align-items:center;
}
.role-btn small{font-size:11px;font-weight:700;color:var(--ink-soft)}
.role-btn.sel-friend{background:#E8F8EC;border-color:var(--leaf);color:var(--leaf-d);box-shadow:0 4px 0 var(--leaf-d)}
.role-btn.sel-enemy{background:#F3EBFA;border-color:var(--berry);color:var(--berry-d);box-shadow:0 4px 0 var(--berry-d)}
.role-btn.sel-job{background:#FFF3E0;border-color:var(--sun);color:var(--sun-d);box-shadow:0 4px 0 var(--sun-d)}

/* ===== zukan / stickers ===== */
.zgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:14px;width:100%;max-width:640px;margin-top:14px;padding-bottom:8px}
.zcard{
  background:var(--card);border:3px solid var(--line);border-radius:24px;padding:14px 8px;
  display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;
  box-shadow:0 5px 0 #EADDC6;position:relative;
}
.zcard.sel{border-color:var(--leaf);box-shadow:0 5px 0 var(--leaf-d)}
.zcard.bossSel{border-color:var(--sun);box-shadow:0 5px 0 var(--sun-d);background:#FFF8E5}
.zcard .avatar,.zcard .avatar-emoji{width:84px;height:84px;font-size:48px;border:4px solid #fff;box-shadow:0 3px 10px rgba(74,59,92,.15)}
.zcard .zname{font-weight:900;font-size:17px}
.zcard .zmeta{font-size:13px;font-weight:700;color:var(--ink-soft)}
.zcard .picked{color:var(--leaf-d);font-weight:900;font-size:14px}
.zcard .ordnum{
  position:absolute;top:-10px;left:-8px;width:36px;height:36px;border-radius:50%;
  background:var(--leaf);color:#fff;font-weight:900;font-size:17px;
  display:flex;align-items:center;justify-content:center;border:3px solid #fff;
  box-shadow:0 2px 6px rgba(74,59,92,.3);
}
.zedit{
  position:absolute;top:-10px;right:-8px;width:40px;height:40px;border-radius:50%;
  border:3px solid #fff;background:var(--blue);font-size:17px;cursor:pointer;
  box-shadow:0 3px 8px rgba(74,59,92,.3);z-index:2;
}
.zedit:active{transform:scale(.9)}
#edit .panel{display:flex;flex-direction:column;align-items:center;gap:16px;margin-bottom:24px}
.del-code{
  font-size:44px;font-weight:900;letter-spacing:10px;color:var(--coral-d);
  font-variant-numeric:tabular-nums;background:#FFF2F2;border:3px dashed var(--coral);
  border-radius:18px;padding:8px 12px 8px 22px;
}
.code-input{
  font-family:inherit;font-size:30px;font-weight:900;text-align:center;letter-spacing:10px;
  border:3px solid var(--line);border-radius:16px;padding:10px;width:220px;color:var(--ink);
  -webkit-user-select:auto;user-select:auto;
}
.code-input.ng{animation:shake .4s;border-color:var(--coral)}
.zsec{font-size:clamp(20px,3.6vw,26px);font-weight:900;margin-top:18px;text-align:center}
.zsec.friends{color:var(--leaf-d)} .zsec.foes{color:var(--berry-d)}
.zhint{font-size:13px;font-weight:700;color:var(--ink-soft);text-align:center;margin-top:4px}
.sgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(76px,1fr));gap:12px;width:100%;max-width:600px;margin-top:14px;padding-bottom:20px}
.scell{
  aspect-ratio:1;background:var(--card);border:3px solid var(--line);border-radius:20px;
  display:flex;align-items:center;justify-content:center;font-size:38px;position:relative;overflow:visible;
  box-shadow:0 4px 0 #EADDC6;
}
.sticker-art{position:relative;display:inline-grid;place-items:center;width:72%;height:72%;border-radius:45% 38% 46% 40%;background:linear-gradient(145deg,#fff 0 15%,var(--st1,#FFE78A) 16% 68%,var(--st2,#FF9FB5));border:4px solid #fff;box-shadow:0 0 0 2px rgba(93,72,105,.14),0 4px 7px rgba(74,59,92,.18);transform:rotate(var(--tilt,-3deg))}
.sticker-art::before{content:"";position:absolute;inset:8%;border:2px dotted rgba(255,255,255,.8);border-radius:42%;pointer-events:none}
.sticker-art::after{content:"✦";position:absolute;right:-8%;top:-12%;color:#fff;font-size:.42em;text-shadow:0 0 0 #FFC53D,0 2px 4px rgba(74,59,92,.2)}
.sticker-art .sticker-emoji{font-size:clamp(30px,5vw,44px);line-height:1;filter:drop-shadow(0 3px 1px rgba(68,48,76,.2));transform:rotate(var(--untilt,3deg))}
.sticker-art.s1{--st1:#BFEFD0;--st2:#70D3AC}.sticker-art.s2{--st1:#CBEAFF;--st2:#79BFF5}.sticker-art.s3{--st1:#E4D6FF;--st2:#AF91EE}.sticker-art.s4{--st1:#FFD8B5;--st2:#FF9B72}.sticker-art.s5{--st1:#FFF0A8;--st2:#FFD45F}
.sticker-art.locked{filter:grayscale(1);opacity:.34;box-shadow:none}.sticker-art.locked::after{content:"?";right:-9%;top:-16%;font-weight:900;color:var(--ink-soft);text-shadow:none}
.scell.empty{opacity:.45;font-size:24px;color:var(--ink-soft);font-weight:900}
.scell .cnt{position:absolute;bottom:3px;right:7px;font-size:12px;font-weight:900;color:var(--ink-soft)}

/* ===== parent ===== */
#parent{align-items:center}
#parent .panel{margin-top:60px;margin-bottom:20px;display:flex;flex-direction:column;gap:20px;font-size:16px}
#parent h3{font-size:19px;color:var(--berry-d);border-bottom:3px dotted var(--line);padding-bottom:6px}
.statrow{display:flex;align-items:center;gap:10px;margin-top:8px}
.statrow .sname{width:88px;font-weight:800;flex:0 0 auto}
.statbar{flex:1;height:18px;background:#F3EDE0;border-radius:999px;overflow:hidden}
.statbar div{height:100%;background:var(--leaf);border-radius:999px}
.statrow .snum{font-size:13px;color:var(--ink-soft);font-weight:700;width:90px;text-align:right;flex:0 0 auto;font-variant-numeric:tabular-nums}
.rowline{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap}
.mini-btn{
  font-family:inherit;border:none;border-radius:14px;padding:10px 18px;font-weight:800;
  font-size:15px;cursor:pointer;background:#F3EDE0;color:var(--ink);
}
.mini-btn.danger{background:#FFE3E3;color:#C0392B}
.mini-btn.danger.armed{background:#C0392B;color:#fff}
.mini-btn.on{background:var(--leaf);color:#fff}
.note{font-size:13px;color:var(--ink-soft);line-height:1.7}
.toggle{width:64px;height:36px;border-radius:999px;border:none;cursor:pointer;position:relative;background:#D8CFC0;transition:background .2s}
.toggle.on{background:var(--leaf)}
.toggle::after{content:"";position:absolute;top:4px;left:4px;width:28px;height:28px;border-radius:50%;background:#fff;transition:left .2s;box-shadow:0 2px 4px rgba(0,0,0,.2)}
.toggle.on::after{left:32px}

/* ===== modal ===== */
#overlay{
  position:fixed;inset:0;background:rgba(74,59,92,.45);z-index:50;
  display:none;align-items:center;justify-content:center;padding:20px;
}
#overlay.active{display:flex}
.modal{
  background:var(--card);border-radius:32px;padding:26px 22px;width:min(92vw,440px);
  display:flex;flex-direction:column;align-items:center;gap:18px;
  box-shadow:0 20px 50px rgba(0,0,0,.25);animation:popin .25s;
}
.modal .mtitle{font-weight:900;font-size:clamp(20px,4vw,26px);text-align:center}
.modal .msub{color:var(--ink-soft);font-weight:700;font-size:15px;text-align:center}
.gate-progress{font-size:14px;color:var(--ink-soft);font-weight:800}
.gate-question{font-size:clamp(30px,7vw,42px);font-weight:900;letter-spacing:.04em}
.gate-form{display:flex;gap:10px;width:100%;align-items:stretch}
.gate-input{
  width:110px;min-height:64px;border:4px solid var(--line);border-radius:16px;
  font-family:inherit;font-size:28px;font-weight:900;line-height:1;text-align:center;color:var(--ink);background:#fff;
}
.gate-input:focus{outline:none;border-color:var(--berry)}
.gate-check{flex:1;min-height:64px}
.gate-error{min-height:24px;color:var(--berry-d);font-size:14px;font-weight:800;text-align:center}

/* ===== confetti ===== */
#confetti{position:fixed;inset:0;pointer-events:none;z-index:60;overflow:hidden}
#confetti span{position:absolute;top:-8%;font-size:30px;animation:fall linear forwards}
@keyframes fall{to{transform:translateY(115vh) rotate(540deg)}}

@media (prefers-reduced-motion:reduce){
  *,*::before,*::after{animation-duration:.01ms !important;animation-iteration-count:1 !important;transition-duration:.01ms !important}
}
@media (max-height:600px){
  .battle-scene{min-height:210px;margin-bottom:5px}
  .enemy-unit .body{width:clamp(66px,12vw,105px);height:clamp(66px,12vw,105px);font-size:clamp(56px,12vw,96px)}
  .enemy-unit img.ebody{width:clamp(64px,11vw,100px);height:clamp(64px,11vw,100px)}
  .enemy-unit.bossu .body{width:clamp(116px,22vw,200px);height:clamp(116px,22vw,200px);font-size:clamp(104px,21vw,184px)}
  .enemy-unit.bossu img.ebody{width:clamp(108px,21vw,190px);height:clamp(108px,21vw,190px)}
  .party-unit .avatar,.party-unit .avatar-emoji{width:clamp(64px,12.5vw,108px);height:clamp(64px,12.5vw,108px);font-size:clamp(38px,7.5vw,64px)}
  .qcard{min-height:80px}
}
@media (max-width:600px){
  #battle.boss-phase .enemy-row{width:56%;flex-basis:56%}
  #battle.boss-phase .party-row{width:44%;flex-basis:44%;gap:6px}
  #battle.boss-phase .party-unit .avatar,#battle.boss-phase .party-unit .avatar-emoji{width:64px;height:64px;font-size:38px}
  #battle.boss-phase .party-unit .char-name{max-width:72px}
}
button:focus-visible,.choice:focus-visible{outline:4px solid var(--blue);outline-offset:2px}
</style>
</head>
<body>
<div id="app">

  <!-- ============ HOME ============ -->
  <div class="screen active" id="home">
    <div>
      <div class="logo"><span class="c1">ぱ</span><span class="c2">しゃ</span><span class="c3">っと</span><br><span class="c4">バト</span><span class="c5">ル!</span></div>
      <div class="tagline">📸 しゃしんが キャラクターに へんしん!</div>
    </div>
    <div class="homechar" id="homeChar"></div>
    <div class="menu">
      <button class="btn big" id="btnPlay">▶ あそぶ</button>
      <button class="btn berry" id="btnCreate" style="width:100%">📷 キャラをつくる</button>
      <div class="iconrow" style="width:100%">
        <button class="btn leaf" id="btnZukan" style="flex:1;white-space:nowrap">📖 ずかん</button>
        <button class="btn sun" id="btnStickers" style="flex:1;white-space:nowrap">🌟 シール</button>
      </div>
    </div>
    <button class="parent-link" id="btnParent">おうちのかたへ</button>
  </div>

  <!-- ============ SUBJECT ============ -->
  <div class="screen" id="subject">
    <button class="btn ghost back" data-go="home">← もどる</button>
    <div style="height:44px"></div>
    <div class="h1 coral">なにで あそぶ?</div>
    <div class="grid">
      <button class="subj s-hira" data-s="hira"><span class="glyph">あ</span><span class="label">ひらがな</span></button>
      <button class="subj s-kata" data-s="kata"><span class="glyph">ア</span><span class="label">カタカナ</span></button>
      <button class="subj s-kazu" data-s="kazu"><span class="glyph">123</span><span class="label">すうじ</span></button>
      <button class="subj s-keisan" data-s="keisan"><span class="glyph">＋−</span><span class="label">けいさん</span></button>
      <button class="subj s-eigo" data-s="eigo"><span class="glyph">ABC</span><span class="label">えいご</span></button>
    </div>
  </div>

  <!-- ============ DUNGEON SELECT ============ -->
  <div class="screen" id="dungeon">
    <button class="btn ghost back" data-go="subject">← もどる</button>
    <div style="height:50px"></div>
    <div class="h1 blue" id="dungeonTitle">ダンジョンを えらぼう</div>
    <div style="color:var(--ink-soft);font-weight:700;margin-top:6px" id="dungeonHint"></div>
    <div class="dgrid" id="dgrid"></div>
  </div>

  <!-- ============ BATTLE ============ -->
  <div class="screen" id="battle">
    <button class="btn ghost back" id="battleBack">← やめる</button>
    <div class="battle-scene">
      <div id="stageBg" aria-hidden="true"></div>
      <div class="battle-top"><span class="subj-chip" id="battleChip"></span></div>
      <div class="arena">
        <div class="enemy-row" id="enemyRow"></div>
        <div class="party-row" id="partyRow"></div>
      </div>
    </div>
    <div class="qcard" id="qcard"></div>
    <div class="choices" id="choices"></div>
    <div id="fxLayer"></div>
  </div>

  <!-- ============ RESULT / LOSE ============ -->
  <div class="screen" id="result"></div>
  <div class="screen" id="lose"></div>

  <!-- ============ CREATE ============ -->
  <div class="screen" id="create">
    <button class="btn ghost back" data-go="home">← もどる</button>
    <div style="height:50px"></div>
    <div class="h1 berry" style="margin-bottom:14px">キャラをつくろう!</div>

    <div class="panel" id="createStep1">
      <div style="font-weight:800;color:var(--ink-soft);text-align:center">おもちゃや じぶんを ぱしゃっと とろう!</div>
      <button class="btn big berry" id="btnCamera">📷 カメラで とる</button>
      <button class="btn blue" id="btnAlbum">🖼 しゃしんを えらぶ</button>
      <input type="file" accept="image/*" capture="environment" id="fileCamera" hidden>
      <input type="file" accept="image/*" id="fileAlbum" hidden>
    </div>

    <div class="panel" id="createStep2" style="display:none">
      <div style="font-weight:800;color:var(--ink-soft)">まるの なかに おさめてね(ゆびで うごかせるよ)</div>
      <div class="cropbox">
        <canvas id="cropCanvas" width="480" height="480"></canvas>
        <div class="mask"></div>
      </div>
      <div class="zoomrow"><span>🔍</span><input type="range" id="zoom" min="100" max="280" value="100"><span>➕</span></div>
      <div class="iconrow">
        <button class="btn ghost" id="btnRetake">とりなおす</button>
        <button class="btn leaf" id="btnCropOk">できた!</button>
      </div>
    </div>

    <div class="panel" id="createStep3" style="display:none">
      <div id="namePreview"></div>
      <div style="font-weight:800;color:var(--ink-soft)">なかま? それとも てき?</div>
      <div class="rolerow">
        <button class="role-btn sel-friend" id="roleFriend">😊 なかま</button>
        <button class="role-btn" id="roleEnemy">😈 てき</button>
      </div>
      <div id="jobRow" style="display:contents">
        <div style="font-weight:800;color:var(--ink-soft)">しょくぎょうを えらぼう</div>
        <div class="rolerow">
          <button class="role-btn sel-job" id="jobWarrior">⚔️ せんし<small>こうげきが つよい!</small></button>
          <button class="role-btn" id="jobMage">🪄 まほうつかい<small>ぜんいんに こうげき!</small></button>
        </div>
      </div>
      <div id="rankRow" style="display:none">
        <div style="font-weight:800;color:var(--ink-soft);text-align:center;margin-bottom:8px">ザコ? それとも ボス?</div>
        <div class="rolerow">
          <button class="role-btn sel-enemy" id="rankZako">😈 ザコ<small>4たいで でてくる</small></button>
          <button class="role-btn" id="rankBoss">👹 ボス<small>さいごに でてくる!</small></button>
        </div>
      </div>
      <div style="font-weight:800;color:var(--ink-soft)">なまえを つけよう</div>
      <div class="namerow">
        <input id="nameInput" maxlength="16" placeholder="なまえ">
        <button class="dice" id="btnDice" aria-label="なまえをランダムにきめる">🎲</button>
      </div>
      <div class="namerow">
        <input id="yomiInput" maxlength="16" placeholder="ふりがな(なくてもOK)">
      </div>
      <div style="font-weight:800;color:var(--ink-soft)">わくの いろ</div>
      <div class="frames" id="frames"></div>
      <button class="btn big" id="btnSaveChar">なかまに する!</button>
    </div>
  </div>

  <!-- ============ EDIT ============ -->
  <div class="screen" id="edit">
    <button class="btn ghost back" id="editBack">← もどる</button>
    <div style="height:50px"></div>
    <div class="h1 blue" style="margin-bottom:14px">キャラの へんこう</div>
    <div class="panel" id="editPanel"></div>
  </div>

  <!-- ============ ZUKAN ============ -->
  <div class="screen" id="zukan">
    <button class="btn ghost back" data-go="home">← もどる</button>
    <div style="height:50px"></div>
    <div class="h1 leaf">キャラ ずかん</div>
    <div id="zbody" style="width:100%;display:flex;flex-direction:column;align-items:center;padding-bottom:20px"></div>

  <!-- ============ STICKERS ============ -->
  <div class="screen" id="stickers">
    <button class="btn ghost back" data-go="home">← もどる</button>
    <div style="height:50px"></div>
    <div class="h1 sun">シールちょう</div>
    <div style="color:var(--ink-soft);font-weight:700;margin-top:6px" id="stickerCount"></div>
    <div class="sgrid" id="sgrid"></div>

  <div class="screen" id="parent">
    <button class="btn ghost back" data-go="home">← もどる</button>

  </div>

</div>

function freshDungeonMaxBySubject(){return {hira:1,kata:1,kazu:1,keisan:1,eigo:1};}
function clampDungeonMax(v){
  const n=parseInt(v,10);
  return Number.isFinite(n)?Math.max(1,Math.min(100,n)):1;
}
function subjectDungeonMax(d,s){
  return clampDungeonMax(d&&d.dungeonMaxBySubject?d.dungeonMaxBySubject[s]:d&&d.dungeonMax);
}
function syncLegacyDungeonMax(d){
  d.dungeonMax=Math.max.apply(null,SUBJECT_KEYS.map(s=>subjectDungeonMax(d,s)));
  return d.dungeonMax;
}
function dungeonProgressText(d){
  return SUBJECT_KEYS.map(s=>SUBJ_LABEL[s]+' '+subjectDungeonMax(d,s)).join(' / ');
}
function freshDb(){
  return {chars:[{id:'d0',name:'にこまる',emoji:'😊',frame:'#FFC53D',xp:0,wins:0,job:'warrior'}],
    enemies:[],party:['d0'],bossId:null,dungeonMax:1,dungeonMaxBySubject:freshDungeonMaxBySubject(),
    stickers:{},stats:{},wins:0,settings:{sound:true,difficulty:'easy'}};
}
const BAK_KEY='pashabattle_v1_bak';
function migrateDb(d){
  if(!d||!d.chars||!d.chars.length)return null;
  if(!d.settings)d.settings={sound:true};
  if(!d.settings.difficulty)d.settings.difficulty='easy';
  if(d.settings.sound===undefined)d.settings.sound=true;
  if(!d.stickers)d.stickers={};
  if(!d.stats)d.stats={};
  if(!d.enemies)d.enemies=[];
  if(!d.wins)d.wins=0;
  if(!d.dungeonMax)d.dungeonMax=Math.min(100,(d.wins||0)+1);
  if(!d.dungeonMaxBySubject||typeof d.dungeonMaxBySubject!=='object'||Array.isArray(d.dungeonMaxBySubject)){
    /* 旧版は全科目で進行度を共有していたため、最も遊んだ科目だけに旧進行度を引き継ぐ。 */
    const legacyMax=clampDungeonMax(d.dungeonMax);
    const progress=freshDungeonMaxBySubject();
    if(legacyMax>1){
      const ranked=SUBJECT_KEYS.map(s=>({s:s,total:Number((d.stats[s]||{}).total)||0}))
        .sort((a,b)=>b.total-a.total);
      progress[ranked[0].total>0?ranked[0].s:'hira']=legacyMax;
    }
    d.dungeonMaxBySubject=progress;
  }
  SUBJECT_KEYS.forEach(s=>{d.dungeonMaxBySubject[s]=clampDungeonMax(d.dungeonMaxBySubject[s]);});
  syncLegacyDungeonMax(d); /* 古いバックアップとの互換用に、全科目中の最大値も残す。 */
  d.chars.forEach(c=>{if(!c.job)c.job='warrior';});
  d.enemies.forEach(e=>{if(!e.rank)e.rank='zako';});
  if(!d.party||!d.party.length){
    const lead=d.currentChar&&d.chars.some(c=>c.id===d.currentChar)?d.currentChar:d.chars[0].id;
    d.party=[lead].concat(d.chars.map(c=>c.id).filter(i=>i!==lead)).slice(0,4);
  }
  d.party=d.party.filter(id=>d.chars.some(c=>c.id===id));
  if(!d.party.length)d.party=[d.chars[0].id];
  if(d.bossId&&!d.enemies.some(e=>e.id===d.bossId))d.bossId=null;
  if(!d.clearsSinceExport)d.clearsSinceExport=0;
  return d;
}

function hasProgress(d){

/* ---- IndexedDBミラー(iOS SafariはlocalStorageを消すことがあるので、より消えにくいIndexedDBにも二重保存) ---- */
let idbSyncDone=false;
function idbOpen(){
  return new Promise((res,rej)=>{
    try{
      const rq=indexedDB.open('pashabattle',1);
      rq.onupgradeneeded=()=>{const d=rq.result;if(!d.objectStoreNames.contains('kv'))d.createObjectStore('kv');};
      rq.onsuccess=()=>res(rq.result);
      rq.onerror=()=>rej(rq.error);
    }catch(e){rej(e);}
  });
}
function idbPut(obj){
  return idbOpen().then(d=>new Promise((res,rej)=>{
    const tx=d.transaction('kv','readwrite');
    tx.objectStore('kv').put(JSON.stringify(obj),'save');
    tx.oncomplete=()=>res();tx.onerror=()=>rej(tx.error);
  })).catch(()=>{});
}
function idbGet(){
  return idbOpen().then(d=>new Promise((res,rej)=>{
    const tx=d.transaction('kv','readonly');
    const rq=tx.objectStore('kv').get('save');
    rq.onsuccess=()=>{try{res(rq.result?JSON.parse(rq.result):null);}catch(e){res(null);}};
    rq.onerror=()=>rej(rq.error);
  })).catch(()=>null);
}
/* すべての変更で自動保存: localStorage(本体+第2キー) と IndexedDB の三重に書き込む */
function save(){
  syncLegacyDungeonMax(db);
  db.savedAt=Date.now();
  try{const s=JSON.stringify(db);localStorage.setItem(KEY,s);if(hasProgress(db))localStorage.setItem(BAK_KEY,s);}catch(e){}
  if(idbSyncDone){idbPut(db);}
}

try{
  idbGet().then(saved=>{
    const m=saved?migrateDb(saved):null;
    if(m&&hasProgress(m)&&!hasProgress(db)){
      db=m;
      try{const s=JSON.stringify(db);localStorage.setItem(KEY,s);localStorage.setItem(BAK_KEY,s);}catch(e){}
      if(typeof renderHome==='function')renderHome();
    }
    idbSyncDone=true;
    idbPut(db);
  }).catch(()=>{idbSyncDone=true;});
}catch(e){idbSyncDone=true;}

function pick(a){return a[Math.floor(Math.random()*a.length)];}
function shuffle(a){const b=a.slice();for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}

let actx=null;
function ac(){
  if(!actx){const A=window.AudioContext||window.webkitAudioContext;if(A)actx=new A();}
  if(actx&&actx.state==='suspended')actx.resume();
  return actx;
}
function tone(f,t0,d,type,g){
  const c=ac();if(!c||!db.settings.sound)return;
  const o=c.createOscillator(),v=c.createGain();
  o.type=type||'sine';o.frequency.value=f;
  v.gain.setValueAtTime(g||0.12,c.currentTime+t0);
  v.gain.exponentialRampToValueAtTime(0.001,c.currentTime+t0+d);
  o.connect(v);v.connect(c.destination);
  o.start(c.currentTime+t0);o.stop(c.currentTime+t0+d);
}

const music={timer:null,step:0,nextT:0,song:null};
function noteAt(midi,t,d,type,g){
  const o=actx.createOscillator(),v=actx.createGain();
  o.type=type;o.frequency.value=440*Math.pow(2,(midi-69)/12);
  v.gain.setValueAtTime(g,t);
  v.gain.exponentialRampToValueAtTime(0.001,t+d);
  o.connect(v);v.connect(actx.destination);
  o.start(t);o.stop(t+d);
}
function startMusic(dark,d){
  const c=ac();if(!c||!db.settings.sound)return;
  stopMusic();
  const pool=dark?SONGS_DARK:SONGS_BRIGHT;
  music.song=pool[((d||1)-1)%pool.length];
  music.step=0;music.nextT=c.currentTime+0.08;
  music.timer=setInterval(musicTick,40);
}
function musicTick(){
  if(!actx||!music.song)return;
  const s=music.song,spb=60/s.bpm/4;
  while(music.nextT<actx.currentTime+0.14){
    const i=music.step%32;
    if(s.mel[i])noteAt(s.mel[i],music.nextT,spb*1.7,'triangle',0.035);
    if(s.bass[i])noteAt(s.bass[i],music.nextT,spb*1.9,'square',0.028);
    if(i%8===4)noteAt(96,music.nextT,0.03,'sine',0.015);
    music.nextT+=spb;music.step++;
  }
}
function stopMusic(){if(music.timer){clearInterval(music.timer);music.timer=null;}music.song=null;}

function pickVoice(lang){
  const base=lang.split('-')[0];
  const vs=voices.filter(v=>(v.lang||'').replace('_','-').toLowerCase().startsWith(base));
  return vs.find(v=>(v.lang||'').replace('_','-')===lang)||vs[0]||null;
}
function speakSeq(parts){
  if(!db.settings.sound||!('speechSynthesis' in window)||!parts)return;
  try{
    speechSynthesis.cancel();
    setTimeout(()=>{

        const u=new SpeechSynthesisUtterance(p.t);
        u.lang=p.l||'ja-JP';
        const v=pickVoice(u.lang);if(v)u.voice=v;
        u.rate=p.r||0.92;u.pitch=1.15;u.volume=1;
        speechSynthesis.speak(u);
      });
    },60);
  }catch(e){}
}

function numDistractors(ans,max){
  const set=new Set();
  const cands=shuffle([ans-2,ans-1,ans+1,ans+2,ans+3,ans-3]);
  for(const c of cands){
    if(c>=0&&c!==ans&&(!max||c<=max)&&!set.has(c))set.add(c);
    if(set.size>=2)break;
  }
  let f=ans+4;while(set.size<2){if(f!==ans&&f>=0)set.add(f);f++;}
  return [...set];
}

function genQ(s,l){
  const key=s+l;let q=null,tries=0;
  do{q=genQraw(s,l);tries++;}while(q.qid&&recentQ[key]&&recentQ[key].indexOf(q.qid)>=0&&tries<14);
  if(q.qid){
    if(!recentQ[key])recentQ[key]=[];
    recentQ[key].push(q.qid);
    if(recentQ[key].length>8)recentQ[key].shift();
  }
  return q;
}

function setHpBar(id,hp,max){
  const el=document.getElementById(id);if(!el)return;
  const p=Math.max(0,Math.round(hp/max*100));
  el.style.width=p+'%';
  el.className='hpfill'+(p<=20?' low':p<=50?' mid':'');
}
function makeZako(d){
  const userZako=db.enemies.filter(e=>e.rank==='zako');
  const stageKey=STAGES[(d-1)%STAGES.length].svg;
  const themed=MONSTERS.filter(m=>m.stages.indexOf(stageKey)>=0);
  const pool=themed.length>=4?themed:MONSTERS;
  const lineup=shuffle(pool).slice(0,4).map(m=>({artId:m.id,name:m.n}));
  if(userZako.length){
    const uz=shuffle(userZako);
    lineup[Math.floor(Math.random()*4)]={img:uz[0].img,name:uz[0].name,yomi:uz[0].yomi,frame:uz[0].frame};
    if(uz.length>1&&Math.random()<0.5){
      let slot=Math.floor(Math.random()*4);
      if(lineup[slot].img)slot=(slot+1)%4;
      lineup[slot]={img:uz[1].img,name:uz[1].name,yomi:uz[1].yomi,frame:uz[1].frame};
    }
  }
  return lineup.map(b=>Object.assign(b,{hp:zakoHp(d),max:zakoHp(d)}));
}
function makeBoss(d){
  let base;
  const sel=db.bossId&&db.enemies.find(e=>e.id===db.bossId&&e.rank==='boss');
  const userBosses=db.enemies.filter(e=>e.rank==='boss');
  if(sel)base={img:sel.img,name:sel.name,yomi:sel.yomi,frame:sel.frame};
  else if(userBosses.length)base={img:userBosses[0].img,name:userBosses[0].name,yomi:userBosses[0].yomi,frame:userBosses[0].frame};
  else{
    const stageKey=STAGES[(d-1)%STAGES.length].svg;
    const themed=BOSS_MONSTERS.filter(m=>m.stages.indexOf(stageKey)>=0);
    const m=pick(themed.length?themed:BOSS_MONSTERS);
    base={artId:m.id,name:m.n};
  }
  return Object.assign(base,{hp:bossHpFor(d),max:bossHpFor(d)});
}
function startBattle(s,d){
  const stage=STAGES[(d-1)%STAGES.length];
  battle={s:s,d:d,ql:qLevelFor(d),phase:'zako',turn:0,miss:0,lock:true,stage:stage,
    zako:makeZako(d),boss:makeBoss(d),
    party:getParty().map(c=>{const st=statsFor(c);return{ch:c,hp:st.maxhp,max:st.maxhp,atk:st.atk};})};
  $('#battleChip').textContent=SUBJ_LABEL[s]+'  ダンジョン'+d;
  const bt=$('#battle');
  bt.className='screen'+(stage.dark?' darkstage':'');
  const bg=$('#stageBg');
  bg.className='variant-'+(Math.floor((d-1)/STAGES.length)%3);
  bg.innerHTML=STAGE_SVGS[stage.svg];
  renderEnemies();
  renderParty();
  $('#qcard').innerHTML='';$('#choices').innerHTML='';$('#fxLayer').innerHTML='';
  show('battle');
  const banner=document.createElement('div');
  banner.className='stage-banner';banner.textContent=stage.e+' ダンジョン'+d+' '+stage.n;
  bt.appendChild(banner);
  setTimeout(()=>banner.remove(),1800);
  say('ダンジョン'+d+'! '+stage.n+'で バトル! てきが あらわれた!');
  setTimeout(()=>{if(battle)startMusic(stage.dark,d);},1500);
  setTimeout(nextQ,1900);
}
function enemyBodyHtml(en,boss){
  const crown=boss?crownHtml():'';
  if(en.img)return crown+'<span class="enemy-portrait" style="--enemy-frame:'+(en.frame||'#5C4A77')+'"><img class="ebody" src="'+en.img+'" alt=""></span>';
  if(en.artId)return crown+'<span class="body">'+monsterSvg(en.artId)+'</span>';
  return crown+'<div class="body">'+en.emoji+'</div>';
}
function renderEnemies(){
  $('#battle').classList.toggle('boss-phase',battle.phase==='boss');
  if(battle.phase==='zako'){
    $('#enemyRow').innerHTML=battle.zako.map((en,i)=>
      '<div class="enemy-unit'+(en.hp<=0?' down':'')+'" id="en'+i+'">'+
      enemyBodyHtml(en,false)+
      hpBarHtml(en.hp,en.max,'ehp'+i)+
      '<div class="ename">'+esc(en.name)+'</div></div>').join('');
  }else{
    const b=battle.boss;
    $('#enemyRow').innerHTML=
      '<div class="enemy-unit bossu'+(b.hp<=0?' down':'')+'" id="enB">'+
      enemyBodyHtml(b,true)+
      hpBarHtml(b.hp,b.max,'ehpB')+
      '<div class="ename">'+esc(b.name)+'</div></div>';
  }
}
function renderParty(){
  $('#partyRow').innerHTML=battle.party.map((m,i)=>
    '<div class="party-unit'+(m.hp<=0?' ko':'')+'" id="pu'+i+'">'+
    avatarHtml(m.ch,{job:true})+
    hpBarHtml(m.hp,m.max,'php'+i)+
    '<div class="char-name">'+esc(m.ch.name)+'</div></div>').join('');
}
function aliveIdxFrom(t){
  const n=battle.party.length;
  for(let k=0;k<n;k++){const i=(t+k)%n;if(battle.party[i].hp>0)return i;}
  return -1;
}
function markNext(){
  const nx=aliveIdxFrom(battle.turn);
  battle.party.forEach((m,i)=>{
    const el=$('#pu'+i);if(el)el.classList.toggle('next',i===nx);
  });
}
function nextQ(){
  if(!battle)return;
  battle.q=genQ(battle.s,battle.ql);
  battle.lock=false;
  markNext();
  renderQ();
  setTimeout(()=>{if(battle)speakSeq(battle.q.say);},350);
}
function renderQ(){
  const q=battle.q,d=q.display;
  let inner='';
  const sub=d.sub?(isPictureValue(d.sub)?'<div class="qsub-picture">'+pictureTokenHtml(d.sub,'',d.subArt)+'</div>':'<div class="qsub">'+d.sub+'</div>'):'';
  if(d.word)inner='<div><div class="qword">'+d.word+'</div>'+sub+'</div>';
  else if(d.count)inner='<div class="qcount">'+countPicturesHtml(d.count.e,d.count.n,false)+'</div>';
  else if(d.formula)inner='<div><div class="qformula">'+d.formula+'</div>'+(d.viz?'<div class="qviz">'+d.viz+'</div>':'')+'</div>';
  else inner='<div><div class="qbig">'+(isPictureValue(d.big)?pictureTokenHtml(d.big,'',d.art):d.big)+'</div>'+sub+'</div>';
  const qc=$('#qcard');
  qc.innerHTML=inner+'<button class="speak-btn" id="btnSpeak" aria-label="もういちど きく">🔊</button>';
  qc.style.animation='none';qc.offsetHeight;qc.style.animation='';
  $('#btnSpeak').addEventListener('click',()=>{sfx('tap');speakSeq(q.say);});
  const ch=$('#choices');
  ch.className='choices'+(q.choices.some(c=>c.word)?' words':'');
  ch.innerHTML='';
  q.choices.forEach((c,i)=>{
    const b=document.createElement('button');
    b.className='choice';
    if(c.label)b.setAttribute('aria-label',c.label);
    if(c.sw)b.innerHTML='<span class="cswatch" style="background:'+c.sw+'"></span>';
    else if(c.count)b.innerHTML=countPicturesHtml(c.count.e,c.count.n,true);
    else if(isPictureValue(c.d))b.innerHTML=pictureTokenHtml(c.d,'',c.art);
    else b.textContent=c.d;
    b.addEventListener('click',()=>answer(i,b));
    ch.appendChild(b);
  });
}
function recordStat(s,ok){
  if(!db.stats[s])db.stats[s]={ok:0,total:0};
  db.stats[s].total++;
  if(ok)db.stats[s].ok++;
  save();
}
function popDmg(el,text,hurt){
  if(!el)return;
  const layer=$('#fxLayer');
  const br=$('#battle').getBoundingClientRect(),r=el.getBoundingClientRect();
  const p=document.createElement('span');
  p.className='dmg-pop'+(hurt?' hurt':'');
  p.textContent=text;
  p.style.left=(r.left-br.left+r.width/2)+'px';
  p.style.top=(r.top-br.top+r.height*0.35)+'px';
  layer.appendChild(p);
  setTimeout(()=>p.remove(),900);
}
function lungeFx(fromEl,toEl,onHit){
  if(!fromEl||!toEl){onHit&&onHit();return;}
  const a=fromEl.getBoundingClientRect(),t=toEl.getBoundingClientRect();
  const dx=(t.left+t.width/2)-(a.left+a.width/2);
  const dy=(t.top+t.height/2)-(a.top+a.height/2);
  fromEl.style.zIndex=6;
  fromEl.style.transition='transform .3s ease-in';
  fromEl.offsetHeight;
  fromEl.style.transform='translate('+dx*0.7+'px,'+dy*0.7+'px) scale(1.15)';
  setTimeout(()=>{
    onHit&&onHit();
    fromEl.style.transition='transform .4s ease-out';
    fromEl.style.transform='';
    setTimeout(()=>{fromEl.style.zIndex='';fromEl.style.transition='';},450);
  },320);
}
function shakeBattle(){
  const bt=$('#battle');
  bt.classList.remove('shake');bt.offsetHeight;bt.classList.add('shake');
  setTimeout(()=>bt.classList.remove('shake'),500);
}
function burst(type,targetEl){
  if(!targetEl)return;
  const layer=$('#fxLayer');
  const br=$('#battle').getBoundingClientRect(),r=targetEl.getBoundingClientRect();
  const cx=r.left-br.left+r.width/2,cy=r.top-br.top+r.height/2;
  const sets={
    punch:['👊','💥','💢','⭐'],slash:['⚔️','💫','✨','⭐'],
    fire:['🔥','🔥','💥','✨'],ice:['❄️','❄️','💎','✨'],thunder:['⚡','⚡','✨','💫'],
    hurt:['💥','💢']};
  const ems=sets[type];
  const main=document.createElement('span');
  main.className='fx-main';main.textContent=ems[0];
  main.style.left=cx+'px';main.style.top=cy+'px';
  layer.appendChild(main);
  const n=type==='hurt'?5:9;
  for(let k=0;k<n;k++){
    const p=document.createElement('span');
    p.className='fx-part';p.textContent=pick(ems.slice(1));
    const ang=Math.random()*Math.PI*2,dist=55+Math.random()*85;
    p.style.left=cx+'px';p.style.top=cy+'px';
    p.style.setProperty('--tx',(Math.cos(ang)*dist)+'px');
    p.style.setProperty('--ty',(Math.sin(ang)*dist)+'px');
    p.style.animationDelay=(Math.random()*0.12)+'s';
    layer.appendChild(p);
  }
  if(type==='slash'){
    for(let k=0;k<3;k++){
      const sl=document.createElement('div');sl.className='fx-slash';
      sl.style.left=cx+'px';sl.style.top=cy+'px';
      sl.style.transform='translate(-50%,-50%) rotate('+(-35+k*30)+'deg)';
      sl.style.animationDelay=(k*0.06)+'s';
      layer.appendChild(sl);
    }
  }
  if(type==='thunder'){
    const bolt=document.createElement('div');bolt.className='fx-bolt';
    bolt.style.left=cx+'px';bolt.style.top=cy+'px';
    layer.appendChild(bolt);
  }
  const flashes={fire:'rgba(255,140,60,.5)',ice:'rgba(140,220,255,.5)',thunder:'rgba(255,240,150,.6)'};
  if(flashes[type]){
    const f=document.createElement('div');f.className='fx-flash';
    f.style.background='radial-gradient(circle at '+cx+'px '+cy+'px,'+flashes[type]+',transparent 65%)';
    layer.appendChild(f);
  }
  setTimeout(()=>{
    [...layer.children].forEach(c=>{if(!c.classList.contains('dmg-pop'))c.remove();});
  },950);
}
function rollDmg(atk){return Math.min(999,Math.max(1,Math.round(atk*(0.9+Math.random()*0.25))));}
function aliveEnemies(){
  return battle.phase==='zako'?battle.zako.filter(e=>e.hp>0):(battle.boss.hp>0?[battle.boss]:[]);
}
function enemyElFor(en){
  if(battle.phase==='boss')return $('#enB');
  const i=battle.zako.indexOf(en);
  return $('#en'+i);
}
function hitEnemy(en,dmg){
  en.hp=Math.max(0,en.hp-dmg);
  const el=enemyElFor(en);
  if(battle.phase==='zako'){const i=battle.zako.indexOf(en);setHpBar('ehp'+i,en.hp,en.max);}
  else setHpBar('ehpB',en.hp,en.max);
  popDmg(el,dmg,false);
  if(el){
    if(en.hp<=0)el.classList.add('down');
    else{el.classList.remove('hit');el.offsetHeight;el.classList.add('hit');}
  }
}
function answer(i,btn){
  if(!battle||battle.lock)return;
  const c=battle.q.choices[i];
  recordStat(battle.s,!!c.ok);
  if(c.ok){
    battle.lock=true;
    btn.classList.add('right');
    sfx('good');
    speakSeq(battle.q.correctSay);
    const ai=aliveIdxFrom(battle.turn);
    const attacker=battle.party[ai];
    battle.turn=ai+1;
    const atkEl=$('#pu'+ai);
    if(attacker.ch.job==='mage'){
      const el=pick(['fire','ice','thunder']);
      if(atkEl){atkEl.classList.add('cast');setTimeout(()=>atkEl.classList.remove('cast'),700);}
      setTimeout(()=>{
        sfx(el);shakeBattle();
        aliveEnemies().forEach(en=>{burst(el,enemyElFor(en));hitEnemy(en,rollDmg(attacker.atk));});
        afterAttack();
      },350);
    }else{
      const type=pick(['punch','slash']);
      const target=aliveEnemies()[0];
      lungeFx(atkEl,enemyElFor(target),()=>{
        sfx(type);shakeBattle();
        burst(type,enemyElFor(target));
        hitEnemy(target,rollDmg(attacker.atk));
        afterAttack();
      });
    }
  }else{
    battle.miss++;
    sfx('bad');
    btn.classList.add('wrong');
    say(pick(ENC));
    enemyCounter();
  }
}
function afterAttack(){
  setTimeout(()=>{
    if(!battle)return;
    if(battle.phase==='zako'&&battle.zako.every(e=>e.hp<=0)){
      bossIntro();
    }else if(battle.phase==='boss'&&battle.boss.hp<=0){
      doWin();
    }else{
      setTimeout(nextQ,900);
    }
  },700);
}
function bossIntro(){
  battle.phase='boss';
  setTimeout(()=>{
    if(!battle)return;
    renderEnemies();
    sfx('roar');
    const bt=$('#battle');
    const banner=document.createElement('div');
    banner.className='stage-banner';banner.textContent='👹 ボスが でてきた!';
    bt.appendChild(banner);
    setTimeout(()=>banner.remove(),1800);
    say(nameOf(battle.boss)+'が あらわれた!');
    shakeBattle();
    setTimeout(nextQ,2000);
  },600);
}
function hurtMember(x,dmg){
  const puEl=$('#pu'+x.i);
  x.m.hp=Math.max(0,x.m.hp-dmg);
  setHpBar('php'+x.i,x.m.hp,x.m.max);
  burst('hurt',puEl);
  popDmg(puEl,dmg,true);
  if(x.m.hp<=0&&puEl)puEl.classList.add('ko');
}
function enemyCounter(){
  if(!battle)return;
  const targets=battle.party.map((m,i)=>({m:m,i:i})).filter(x=>x.m.hp>0);
  if(!targets.length)return;
  const en=aliveEnemies()[0];
  if(!en)return;
  const enEl=enemyElFor(en);
  const baseDmg=()=>Math.min(999,Math.max(1,Math.round(enemyDmg(battle.d)*(0.9+Math.random()*0.2))));
  if(battle.phase==='boss'){
    /* boss attacks the whole party */
    lungeFx(enEl,$('#partyRow'),()=>{
      if(!battle)return;
      sfx('roar');sfx('hurt');shakeBattle();
      const fallen=[];
      targets.forEach(x=>{
        hurtMember(x,baseDmg());
        if(x.m.hp<=0)fallen.push(nameOf(x.m.ch));
      });
      if(battle.party.every(m=>m.hp<=0)){setTimeout(doLose,800);return;}
      if(fallen.length>=2)say('たいへん! みんな がんばれ!');
      else if(fallen.length===1)say(fallen[0]+'が たおれちゃった! みんな がんばれ!');
      if(fallen.length)markNext();
    });
  }else{
    const tgt=pick(targets);
    const puEl=$('#pu'+tgt.i);
    lungeFx(enEl,puEl,()=>{
      if(!battle)return;
      sfx('hurt');shakeBattle();
      hurtMember(tgt,baseDmg());
      if(tgt.m.hp<=0){
        if(battle.party.every(m=>m.hp<=0)){setTimeout(doLose,800);return;}
        say(nameOf(tgt.m.ch)+'が たおれちゃった! みんな がんばれ!');
        markNext();
      }
    });
  }
}
function doWin(){
  if(!battle)return;
  stopMusic();
  sfx('win');
  say('ボスを たおした! ダンジョン クリア!');
  confetti();
  const b=battle;battle=null;
  setTimeout(()=>showResult(b),1600);
}
function doLose(){
  if(!battle)return;
  stopMusic();
  sfx('lose');
  const b=battle;battle=null;
  say('まけちゃった… でも だいじょうぶ! もういちど ちょうせんしよう!');
  b.party.forEach(m=>{m.ch.xp=(m.ch.xp||0)+10;});
  save();
  const r=$('#lose');
  r.innerHTML=
    '<div class="h1 blue result-title">まけちゃった…</div>'+
    '<div style="font-size:clamp(50px,10vw,80px)">😢</div>'+
    '<div class="xp-note">でも がんばったから みんなに +10 XP!</div>'+
    '<div class="iconrow" style="margin-top:8px">'+
      '<button class="btn big" id="btnRetry">もういっかい!</button>'+
      '<button class="btn ghost" id="btnHomeL">おうちへ</button></div>';
  show('lose');
  $('#btnRetry').addEventListener('click',()=>{sfx('pop');startBattle(b.s,b.d);});
  $('#btnHomeL').addEventListener('click',()=>{sfx('tap');renderHome();show('home');});
}
function showResult(b){
  const st=pick(STICKERS);
  const stName=STICKER_NAMES[st]||'きらきら';
  db.stickers[st]=(db.stickers[st]||0)+1;
  db.wins++;
  db.clearsSinceExport=(db.clearsSinceExport||0)+1;
  const perfect=b.miss===0;
  let gain=50+b.d*5;
  if(perfect)gain=Math.round(gain*1.5);
  const lvups=[];
  b.party.forEach(m=>{
    const before=charLevel(m.ch);
    m.ch.xp=(m.ch.xp||0)+gain;
    m.ch.wins=(m.ch.wins||0)+1;
    if(charLevel(m.ch)>before)lvups.push(m.ch.name);
  });
  let unlocked=false;
  let nextMax=subjectDungeonMax(db,b.s);
  if(b.d===nextMax&&nextMax<100){
    nextMax++;
    db.dungeonMaxBySubject[b.s]=nextMax;
    syncLegacyDungeonMax(db);
    unlocked=true;
  }
  save();
  const r=$('#result');
  r.innerHTML=
    '<div class="h1 sun result-title">クリア!🎉</div>'+
    (perfect?'<div class="perfect">✨パーフェクト!✨</div>':'')+
    '<div class="sticker-get"><div class="st">'+stickerArtHtml(st,false)+'</div><div class="cap">'+stName+'の シールを ゲット!</div></div>'+
    '<div class="result-party">'+b.party.map(m=>
      '<div>'+avatarHtml(m.ch,{job:true})+'<div class="char-name">'+esc(m.ch.name)+'</div></div>').join('')+'</div>'+
    '<div class="xp-note">みんなに +'+gain+' XP!</div>'+
    lvups.map(n=>'<div class="lvup-line">🎊 '+esc(n)+'が レベルアップ!</div>').join('')+
    (unlocked?'<div class="unlock-line">🗝️ '+SUBJ_LABEL[b.s]+'の ダンジョン'+nextMax+'が ひらいた!</div>':'')+
    '<div class="iconrow" style="margin-top:8px">'+
      (unlocked?'<button class="btn big leaf" id="btnNextD">つぎのダンジョンへ!</button>':'')+
      '<button class="btn'+(unlocked?'':' big')+'" id="btnAgain">もういっかい!</button>'+
      '<button class="btn blue" id="btnOther">べつのもんだい</button>'+
      '<button class="btn ghost" id="btnHome2">おうちへ</button></div>'+
    (db.clearsSinceExport>=3?'<button class="mini-btn" id="btnSaveFile" style="margin-top:6px">💾 ほぞんしてから '+db.clearsSinceExport+'かい クリアしたよ — ファイルに ほぞんする</button>':'');
  show('result');
  if(lvups.length)setTimeout(()=>{sfx('win');say('レベルアップ! つよくなったよ!');},1600);
  const nd=$('#btnNextD');
  if(nd)nd.addEventListener('click',()=>{sfx('pop');startBattle(b.s,b.d+1);});
  $('#btnAgain').addEventListener('click',()=>{sfx('pop');startBattle(b.s,b.d);});
  $('#btnOther').addEventListener('click',()=>{sfx('pop');show('subject');});
  $('#btnHome2').addEventListener('click',()=>{sfx('tap');renderHome();show('home');});
  const sf=$('#btnSaveFile');
  if(sf)sf.addEventListener('click',()=>{sfx('tap');exportSave();});
}
$('#battleBack').addEventListener('click',()=>{sfx('tap');battle=null;stopMusic();renderHome();show('home');});

function confetti(){
  const box=$('#confetti');
  const ems=['🎉','⭐','🌸','✨','💛','🎈'];
  let html='';
  for(let i=0;i<38;i++){
    html+='<span style="left:'+(Math.random()*100)+'vw;animation-duration:'+(1.8+Math.random()*1.4)+'s;animation-delay:'+(Math.random()*0.5)+'s;font-size:'+(20+Math.random()*22)+'px">'+pick(ems)+'</span>';
  }
  box.innerHTML=html;
  setTimeout(()=>{box.innerHTML='';},3600);
}

  $('#createStep1').style.display='';
  $('#createStep2').style.display='none';
  $('#createStep3').style.display='none';
  show('create');
  say('おもちゃや じぶんを ぱしゃっと とろう!');
}
$('#btnCamera').addEventListener('click',()=>{sfx('tap');$('#fileCamera').click();});
$('#btnAlbum').addEventListener('click',()=>{sfx('tap');$('#fileAlbum').click();});
[$('#fileCamera'),$('#fileAlbum')].forEach(inp=>{
  inp.addEventListener('change',e=>{
    const f=e.target.files&&e.target.files[0];
    e.target.value='';
    if(!f)return;
    const rd=new FileReader();
    rd.onload=()=>{
      const img=new Image();
      img.onload=()=>{
        cs.img=img;cs.zoom=1;cs.ox=0;cs.oy=0;
        $('#zoom').value=100;
        $('#createStep1').style.display='none';
        $('#createStep2').style.display='';
        drawCrop();
        say('まるの なかに おさめてね');
      };
      img.src=rd.result;
    };
    rd.readAsDataURL(f);
  });
});
const cvs=$('#cropCanvas'),ctx=cvs.getContext('2d');
function drawCrop(){
  if(!cs.img)return;
  ctx.fillStyle='#EDE6F5';ctx.fillRect(0,0,480,480);
  const iw=cs.img.naturalWidth,ih=cs.img.naturalHeight;
  const s=(480/Math.min(iw,ih))*cs.zoom;
  ctx.drawImage(cs.img,240-iw*s/2+cs.ox,240-ih*s/2+cs.oy,iw*s,ih*s);
}
let drag=null;
cvs.addEventListener('pointerdown',e=>{
  drag={x:e.clientX,y:e.clientY};
  cvs.setPointerCapture(e.pointerId);
});
cvs.addEventListener('pointermove',e=>{
  if(!drag)return;
  const r=cvs.getBoundingClientRect();
  const f=480/r.width;
  cs.ox+=(e.clientX-drag.x)*f;
  cs.oy+=(e.clientY-drag.y)*f;
  const lim=300*cs.zoom;
  cs.ox=Math.max(-lim,Math.min(lim,cs.ox));
  cs.oy=Math.max(-lim,Math.min(lim,cs.oy));
  drag={x:e.clientX,y:e.clientY};
  drawCrop();
});
cvs.addEventListener('pointerup',()=>{drag=null;});
cvs.addEventListener('pointercancel',()=>{drag=null;});
$('#zoom').addEventListener('input',e=>{cs.zoom=e.target.value/100;drawCrop();});

/* ---- セーブデータのファイル書き出し/読み込み(共通) ---- */
function exportText(){return JSON.stringify(db);}
function exportName(){return 'pasha-battle-save-'+new Date().toISOString().slice(0,10)+'.json';}
function markExported(){
  db.lastExportAt=Date.now();db.clearsSinceExport=0;save();

}
function applyImportedText(t){
  try{

    openInfo('復元しました','キャラクター'+db.chars.length+'体・進み具合: '+dungeonProgressText(db)+' を読み込みました。');
  }catch(e){
    openInfo('読み込めませんでした','保存したデータをそのまま全部(最初の{から最後の}まで)使ってください。');
  }
}
function openCopyModal(text){
  overlay.innerHTML='<div class="modal"><div class="mtitle">データをコピーして保存</div>'+
    '<div class="msub">「ぜんぶコピー」を押して、メモアプリに貼り付けて保存してください</div>'+
    '<textarea id="copyArea" readonly style="width:100%;height:110px;font-size:11px;font-family:monospace;border:3px solid var(--line);border-radius:12px;padding:8px;-webkit-user-select:text;user-select:text"></textarea>'+
    '<div class="iconrow"><button class="btn leaf" id="copyBtn" style="min-height:52px;padding:12px 24px;font-size:18px">ぜんぶコピー</button>'+
    '<button class="mini-btn" id="copyClose">とじる</button></div></div>';
  overlay.classList.add('active');
  const ta=$('#copyArea');ta.value=text;
  $('#copyBtn').addEventListener('click',async()=>{
    let ok=false;
    try{await navigator.clipboard.writeText(text);ok=true;}catch(e){}
    if(!ok){try{ta.focus();ta.select();ta.setSelectionRange(0,text.length);ok=document.execCommand('copy');}catch(e){}}
    $('#copyBtn').textContent=ok?'コピーしました!':'枠を長押し→すべてを選択→コピー';
    if(ok)markExported();
  });
  $('#copyClose').addEventListener('click',()=>{sfx('tap');closeOverlay();});
}
function openPasteModal(){
  overlay.innerHTML='<div class="modal"><div class="mtitle">貼り付けて復元</div>'+
    '<div class="msub">メモに保存しておいたデータを下の枠に貼り付けて、「復元する」を押してください</div>'+
