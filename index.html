async function exportSave(){
  const text=exportText();
  /* iPad: 共有シート(→"ファイル"に保存)。埋め込みページではダウンロードがブロックされるため */
  try{
    const file=new File([text],exportName(),{type:'application/json'});
    if(navigator.canShare&&navigator.canShare({files:[file]})){
      await navigator.share({files:[file],title:'ぱしゃっとバトル セーブデータ'});
      markExported();
      return;
    }
  }catch(e){if(e&&e.name==='AbortError')return;}
  /* 共有シートが使えない環境: ダウンロードを試み、だめな場合に備えてコピー画面も開く */
  try{
    const blob=new Blob([text],{type:'application/json'});
    const a=document.createElement('a');
    a.href=URL.createObjectURL(blob);a.download=exportName();
    document.body.appendChild(a);a.click();a.remove();
    setTimeout(()=>{try{URL.revokeObjectURL(a.href);}catch(e){}},5000);
    markExported();
  }catch(e){}
  openCopyModal(text);
}

function openGate(){
  let passed=0,lastPair='',problem=null;
  overlay.innerHTML=
    '<div class="modal"><div class="mtitle">おうちのかたへ</div>'+
    '<div class="msub">大人の確認です。2問続けて正解してください。</div>'+
    '<div class="gate-progress" id="gateProgress"></div>'+
    '<div class="gate-question" id="gateQuestion"></div>'+
    '<div class="gate-form"><input class="gate-input" id="gateAnswer" type="number" inputmode="numeric" pattern="[0-9]*" min="0" max="99" autocomplete="off" aria-label="かけ算の答え">'+
    '<button class="btn leaf gate-check" id="gateCheck">確認する</button></div>'+
    '<div class="gate-error" id="gateError" aria-live="polite"></div>'+
    '<button class="mini-btn" id="gateClose">とじる</button></div>';
  overlay.classList.add('active');
  $('#gateClose').addEventListener('click',()=>{sfx('tap');closeOverlay();});
  function nextGateProblem(message){
    let a,b,key;
    do{
      a=3+Math.floor(Math.random()*7);
      b=3+Math.floor(Math.random()*7);
      key=Math.min(a,b)+'x'+Math.max(a,b);
    }while(key===lastPair);
    lastPair=key;problem={answer:a*b};
    $('#gateProgress').textContent=(passed+1)+'問目 / 2問';
    $('#gateQuestion').textContent=a+' × '+b+' = ?';
    $('#gateAnswer').value='';
    $('#gateError').textContent=message||'';
    requestAnimationFrame(()=>$('#gateAnswer').focus());
  }
  function checkGateAnswer(){
    const raw=$('#gateAnswer').value.trim();
    if(!raw){$('#gateError').textContent='答えを入力してください。';return;}
    if(Number(raw)===problem.answer){
      passed++;
      if(passed>=2){sfx('pop');closeOverlay();renderParent();show('parent');return;}
      sfx('pop');nextGateProblem('正解です。もう1問です。');
    }else{
      passed=0;sfx('bad');nextGateProblem('違います。新しい問題で最初からやり直してください。');
    }
  }
  $('#gateCheck').addEventListener('click',checkGateAnswer);
  $('#gateAnswer').addEventListener('keydown',e=>{if(e.key==='Enter')checkGateAnswer();});
  nextGateProblem('');
}
function renderParent(){
  /* 自動バックアップが「今のデータより多い」ときだけ復元ボタンを出す */
  let bakInfo=null;
  try{
    const b=migrateDb(JSON.parse(localStorage.getItem(BAK_KEY)));
    if(b&&b.chars&&(b.chars.length>db.chars.length||SUBJECT_KEYS.some(s=>subjectDungeonMax(b,s)>subjectDungeonMax(db,s))))
      bakInfo={chars:b.chars.length,progress:dungeonProgressText(b)};
  }catch(e){}
  const stats=['hira','kata','kazu','keisan','eigo'].map(s=>{
    const st=db.stats[s]||{ok:0,total:0};
    const pct=st.total?Math.round(st.ok/st.total*100):0;
    return '<div class="statrow"><span class="sname">'+SUBJ_LABEL[s]+'</span>'+
      '<div class="statbar"><div style="width:'+pct+'%"></div></div>'+
      '<span class="snum">'+st.ok+'/'+st.total+'問 ('+pct+'%)</span></div>';
  }).join('');
  const charRows=db.chars.map(c=>{
    const st=statsFor(c);
    return '<div class="rowline"><span style="font-weight:800">'+(c.img?'📷':'😊')+' '+esc(c.name)+
    ' ('+(c.job==='mage'?'魔法使い':'戦士')+' Lv.'+charLevel(c)+' / 攻撃'+st.atk+' / HP'+st.maxhp+')</span>'+
    (db.chars.length>1?'<button class="mini-btn danger del-char" data-id="'+c.id+'" data-list="chars">けす</button>':'')+'</div>';
  }).join('');
  const enemyRows=db.enemies.map(c=>
    '<div class="rowline"><span style="font-weight:800">'+(c.rank==='boss'?'👹':'😈')+' '+esc(c.name)+' ('+(c.rank==='boss'?'ボス':'ザコ')+')</span>'+
    '<button class="mini-btn danger del-char" data-id="'+c.id+'" data-list="enemies">けす</button></div>').join('');
  const diff=db.settings.difficulty;
  const dungeonInputs=SUBJECT_KEYS.map(s=>
    '<div class="rowline"><label for="dmax-'+s+'">'+SUBJ_LABEL[s]+'</label><input class="dmax-input" id="dmax-'+s+'" data-subject="'+s+'" type="number" min="1" max="100" value="'+subjectDungeonMax(db,s)+'" style="width:84px;font-family:inherit;font-size:18px;font-weight:800;border:3px solid var(--line);border-radius:12px;padding:8px;text-align:center;color:var(--ink)"></div>'
  ).join('');
  $('#parentPanel').innerHTML=
    '<h3>🎚 ゲームのむずかしさ</h3>'+
    '<div class="rowline"><button class="mini-btn'+(diff==='easy'?' on':'')+'" id="diffEasy">やさしい</button>'+
    '<button class="mini-btn'+(diff==='normal'?' on':'')+'" id="diffNormal">ふつう</button></div>'+
    '<div class="note">やさしい: 敵の攻撃はごく弱く、まず倒れません。<br>ふつう: 敵の攻撃が強くなり、キャラのレベルがダンジョン番号より低いと倒されることがあります(適正レベルなら基本大丈夫です)。</div>'+
    '<h3>📊 がくしゅうのきろく</h3><div>'+(Object.keys(db.stats).length?stats:'<div class="note">まだ記録がありません。バトルで遊ぶと、科目ごとの正答数がここに表示されます。</div>')+'</div>'+
    '<h3>🔈 おと</h3><div class="rowline"><span>効果音・読み上げ・バトルBGM</span><button class="toggle'+(db.settings.sound?' on':'')+'" id="sndToggle" aria-label="おとのオンオフ"></button></div>'+
    '<div class="note">音が出ない場合は、iPad本体の消音モード(コントロールセンター)と音量をご確認ください。</div>'+
    '<h3>👨‍👩‍👧 キャラクターの管理 (なかま'+db.chars.length+'/'+CAP+'・てき'+db.enemies.length+'/'+CAP+')</h3>'+
    '<div style="display:flex;flex-direction:column;gap:10px">'+charRows+(enemyRows?'<div class="note" style="margin-top:4px">てきキャラ:</div>'+enemyRows:'')+'</div>'+
    '<div class="note">戦士=攻撃力が高い単体攻撃。魔法使い=攻撃力は低いが敵全体を攻撃。ダンジョンは科目ごとに進み、同じ科目でクリアすると次の番号が開きます(各100)。バトル中、まちがえると敵が攻撃してきます。HPはバトルごとに全回復します。</div>'+
    '<h3>💾 バックアップ</h3>'+
    '<div class="note" style="background:#F3EDE0;border-radius:12px;padding:10px">いまのデータ: なかま'+db.chars.length+'体 / てき'+db.enemies.length+'体<br>進み具合: '+dungeonProgressText(db)+'<br>さいごの自動保存: '+(db.savedAt?new Date(db.savedAt).toLocaleString('ja-JP'):'—')+'<br>さいごのファイル保存: '+(db.lastExportAt?new Date(db.lastExportAt).toLocaleString('ja-JP'):'まだ')+(db.clearsSinceExport?'(そのあと'+db.clearsSinceExport+'回クリア)':'')+'</div>'+
    '<div class="note">進み具合は、あそぶたび(ダンジョンをクリアするたび)に この端末の3か所へ自動で上書き保存されます。ただしiPadは再起動などでブラウザの保存データを消してしまうことがあるため、ときどき下のボタンで端末の外へも保存しておくと確実です。</div>'+
    '<div class="rowline"><span>共有シートで保存(→"ファイル"に保存)</span><button class="mini-btn" id="expSave">保存する</button></div>'+
    '<div class="rowline"><span>文字としてコピー(→メモに貼り付け)</span><button class="mini-btn" id="expCopy">コピーする</button></div>'+
    '<div class="rowline"><span>ファイルから復元</span><button class="mini-btn" id="impSave">読み込む</button></div>'+
    '<div class="rowline"><span>貼り付けて復元(メモから)</span><button class="mini-btn" id="impPaste">貼り付ける</button></div>'+
    '<input type="file" id="impFile" accept=".json,.txt,application/json,text/plain" hidden>'+
    (bakInfo?'<div class="rowline"><span>端末内の自動バックアップから復元<br><small style="color:var(--ink-soft)">(キャラ'+bakInfo.chars+'体・'+bakInfo.progress+')</small></span><button class="mini-btn danger" id="bakRestore">復元</button></div>':'')+
    '<h3>🗝 ダンジョン開放数 (各1〜100)</h3><div style="display:flex;flex-direction:column;gap:8px">'+dungeonInputs+'</div>'+
    '<button class="mini-btn" id="dmaxSet">この進み具合を適用</button>'+
    '<div class="note">データが消えてしまった場合など、科目ごとの進み具合をここから戻せます。</div>'+
    '<h3>🗑 データ</h3><div class="rowline"><span>すべての記録を消す</span><button class="mini-btn danger" id="resetAll">リセット</button></div>'+
    '<h3>🔒 プライバシー</h3><div class="note">撮影した写真とすべての記録は、この端末(ブラウザ)の中にだけ保存されます。インターネットへの送信は一切ありません。ブラウザのデータを消去するとゲームのデータも消えます。</div>';
  $('#diffEasy').addEventListener('click',()=>{db.settings.difficulty='easy';save();renderParent();});
  $('#diffNormal').addEventListener('click',()=>{db.settings.difficulty='normal';save();renderParent();});
  $('#expSave').addEventListener('click',()=>{exportSave();});
  $('#expCopy').addEventListener('click',()=>{sfx('tap');openCopyModal(exportText());});
  $('#impSave').addEventListener('click',()=>{$('#impFile').click();});
  $('#impPaste').addEventListener('click',()=>{sfx('tap');openPasteModal();});
  $('#impFile').addEventListener('change',e=>{
    const f=e.target.files&&e.target.files[0];
    e.target.value='';
    if(!f)return;
    const rd=new FileReader();
    rd.onload=()=>{applyImportedText(rd.result);};
    rd.readAsText(f);
  });
  const bakBtn=$('#bakRestore');
  if(bakBtn)bakBtn.addEventListener('click',()=>{
    if(!bakBtn.classList.contains('armed')){
      bakBtn.classList.add('armed');bakBtn.textContent='今のデータに上書きします。OK?';
      setTimeout(()=>{bakBtn.classList.remove('armed');bakBtn.textContent='復元';},4000);
      return;
    }
    try{
      const d=migrateDb(JSON.parse(localStorage.getItem(BAK_KEY)));
      if(!d)throw new Error('bad');
      db=d;save();renderParent();renderHome();
      openInfo('復元しました','キャラクター'+db.chars.length+'体・進み具合: '+dungeonProgressText(db)+' に戻しました。');
    }catch(e){openInfo('エラー','自動バックアップを読み込めませんでした。');}
  });
  $('#dmaxSet').addEventListener('click',()=>{
    const values={};let valid=true;
    document.querySelectorAll('.dmax-input').forEach(input=>{
      const v=parseInt(input.value,10);
      if(v<1||v>100||!Number.isFinite(v))valid=false;
      values[input.dataset.subject]=v;
    });
    if(valid){SUBJECT_KEYS.forEach(s=>{db.dungeonMaxBySubject[s]=values[s];});syncLegacyDungeonMax(db);save();sfx('pop');renderParent();}
  });
  $('#sndToggle').addEventListener('click',e=>{
    db.settings.sound=!db.settings.sound;save();
    e.target.classList.toggle('on',db.settings.sound);
    if(db.settings.sound){sfx('pop');say('おとが でるように なったよ');}
  });
  document.querySelectorAll('.del-char').forEach(b=>{
    b.addEventListener('click',()=>{
      if(!b.classList.contains('armed')){
        b.classList.add('armed');b.textContent='ほんとうに けす?';
        setTimeout(()=>{b.classList.remove('armed');b.textContent='けす';},3000);
        return;
      }
      if(b.dataset.list==='chars'){
        db.chars=db.chars.filter(c=>c.id!==b.dataset.id);
        db.party=db.party.filter(id=>db.chars.some(c=>c.id===id));
        if(!db.party.length)db.party=[db.chars[0].id];
      }else{
        db.enemies=db.enemies.filter(c=>c.id!==b.dataset.id);
        if(db.bossId&&!db.enemies.some(e=>e.id===db.bossId))db.bossId=null;
      }
      save();renderParent();
    });
  });
  $('#resetAll').addEventListener('click',e=>{
    const b=e.target;
    if(!b.classList.contains('armed')){
      b.classList.add('armed');b.textContent='ほんとうに消す?';
      setTimeout(()=>{b.classList.remove('armed');b.textContent='リセット';},3000);
      return;
    }
    db=freshDb();
    try{localStorage.removeItem(BAK_KEY);}catch(e){}
    idbPut(db); /* IndexedDBミラーも初期化(古いデータが自動復元されないように) */
    save();renderParent();renderHome();
  });
}
</script>
</body>
</html>
